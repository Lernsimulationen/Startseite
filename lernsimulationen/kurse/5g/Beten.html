<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'none';" />
  <title>Sternenpost - Lernpfad Beten</title>
  <link rel="stylesheet" href="assets/beten/style.css" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <a class="brand-pill" href="index.html">5g</a>
      <div class="brand-lockup">
        <p class="eyebrow">Sternenpost</p>
        <h1>Beten entdecken</h1>
      </div>
      <div class="status-box">
        <span id="statusScore">⭐ 0 Sternenfunken</span>
        <span id="statusProgress">0 / 5 Stationen</span>
      </div>
    </header>

    <section class="progress-panel">
      <div class="progress-copy">
        <p class="eyebrow">Lernpfad</p>
        <p id="progressLabel">Startklar</p>
      </div>
      <div class="track">
        <div class="track-fill" id="progressFill"></div>
      </div>
      <nav class="station-strip" aria-label="Stationen">
        <span class="station-dot" data-station-dot="voices">1</span>
        <span class="station-dot" data-station-dot="differences">2</span>
        <span class="station-dot" data-station-dot="memory">3</span>
        <span class="station-dot" data-station-dot="quiz">4</span>
        <span class="station-dot" data-station-dot="builder">5</span>
      </nav>
    </section>

    <main id="app" class="app-shell"></main>
  </div>

  <script src="assets/beten/script.js"></script>
</body>
</html>
