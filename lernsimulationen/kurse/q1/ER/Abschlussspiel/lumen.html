<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LUMEN – Das große Q1-Finale</title>
<style>
:root{
  --bg:#151a35; --bg2:#202852; --panel:#29315a; --panel2:#333d70;
  --gold:#f4c95d; --gold2:#ffe29a; --glass-red:#e05263; --glass-blue:#5b8def;
  --glass-green:#5fbf77; --glass-purple:#9b6fd4; --lead:#0a0c18;
  --text:#f2efe6; --muted:#9aa0c3;
  --w1:#e08d3c; --w2:#5b8def; --w3:#9b6fd4; --w4:#5fbf77;
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:Georgia,'Times New Roman',serif; background:var(--bg); color:var(--text);
  background-image:radial-gradient(ellipse at 50% -20%, #465596 0%, #202852 42%, var(--bg) 78%);
  min-height:100vh; overflow-x:hidden;
}
button{font-family:inherit;}
.hidden{display:none !important;}
#app{max-width:1200px; margin:0 auto; padding:16px; min-height:100vh; display:flex; flex-direction:column;}

/* ===== Typo ===== */
h1{font-size:clamp(2rem,6vw,4rem); letter-spacing:.35em; text-align:center; color:var(--gold);
   text-shadow:0 0 30px rgba(244,201,93,.35); font-weight:normal;}
h2{font-size:clamp(1.3rem,3.5vw,2.4rem); text-align:center; font-weight:normal;}
.subtitle{text-align:center; color:var(--muted); letter-spacing:.15em; margin-top:6px;}

/* ===== Buttons ===== */
.btn{
  display:inline-block; border:none; cursor:pointer; border-radius:14px;
  padding:14px 26px; font-size:1.1rem; color:var(--lead); background:var(--gold);
  box-shadow:0 4px 0 #b8923c, 0 8px 24px rgba(0,0,0,.4); transition:transform .08s, filter .15s;
}
.btn:active{transform:translateY(3px); box-shadow:0 1px 0 #b8923c;}
.btn:disabled{filter:grayscale(.8) brightness(.6); cursor:default;}
.btn.secondary{background:var(--panel2); color:var(--text); box-shadow:0 4px 0 #12152b, 0 8px 24px rgba(0,0,0,.4);}
.btn.big{font-size:1.5rem; padding:20px 40px;}
.btn.small{font-size:.95rem; padding:8px 16px; border-radius:10px;}
.btn.danger{background:var(--glass-red); color:#fff; box-shadow:0 4px 0 #8c2f3b;}

/* ===== Panels ===== */
.panel{background:var(--panel); border:1px solid #5665a0; border-radius:18px; padding:22px; box-shadow:0 10px 40px rgba(0,0,0,.38);}
.center{text-align:center;}
.row{display:flex; gap:14px; flex-wrap:wrap; justify-content:center; align-items:center;}
.spacer{flex:1;}
.join-qr{display:flex; align-items:center; justify-content:center; gap:18px; max-width:620px; margin:0 auto; padding:14px 18px; background:rgba(255,255,255,.96); border:2px solid var(--gold); border-radius:18px; color:var(--lead); box-shadow:0 10px 30px rgba(0,0,0,.35);}
.join-qr img{width:clamp(120px,22vw,180px); height:auto; image-rendering:pixelated;}
.join-qr p{font-size:1.05rem; line-height:1.45; text-align:left;}
@media(max-width:520px){.join-qr{flex-direction:column; text-align:center;}.join-qr p{text-align:center;}}

/* ===== Kirchenfenster (CSS-Zeichnung) ===== */
.window-frame{
  width:min(46vh,340px); aspect-ratio:.62; margin:0 auto; position:relative;
  border-radius:50% 50% 8px 8px / 38% 38% 8px 8px;
  background:var(--lead); padding:12px; box-shadow:0 0 85px rgba(244,201,93,.28), 0 0 30px rgba(120,160,255,.2), inset 0 0 20px #000;
}
.window-inner{
  width:100%; height:100%; border-radius:50% 50% 4px 4px / 38% 38% 4px 4px; overflow:hidden;
  display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1.25fr 1fr; gap:10px; background:var(--lead);
}
.pane{position:relative; transition:all 1.2s ease; display:flex; align-items:center; justify-content:center; font-size:clamp(1.6rem,5vh,3rem); filter:grayscale(1) brightness(.38);}
.pane .pane-label{position:absolute; bottom:6px; left:0; right:0; text-align:center; font-size:.55rem; letter-spacing:.1em; color:rgba(255,255,255,.75); text-transform:uppercase;}
.pane.w1{background:radial-gradient(circle at 50% 60%, #f4a259 0%, #b3502c 55%, #6e2a18 100%);}
.pane.w2{background:radial-gradient(circle at 50% 40%, #7fa8f0 0%, #2d4f9e 55%, #14264f 100%);}
.pane.w3{background:radial-gradient(circle at 50% 50%, #b58ae0 0%, #5f3b91 55%, #2c1b47 100%);}
.pane.w4{background:radial-gradient(circle at 50% 45%, #8fd6a0 0%, #35774a 55%, #143521 100%);}
.pane.lit{filter:grayscale(0) brightness(1.35) saturate(1.1); box-shadow:inset 0 0 40px rgba(255,255,255,.55), 0 0 20px rgba(255,255,255,.18);}
.pane.glow{animation:paneGlow 2.2s ease-in-out infinite alternate;}
@keyframes paneGlow{from{box-shadow:inset 0 0 20px rgba(255,255,255,.25);} to{box-shadow:inset 0 0 55px rgba(255,255,255,.7);}}

/* ===== KI-Bild-Platzhalter ===== */
.ai-img{position:relative; border-radius:14px; overflow:hidden; border:3px solid var(--lead); background:#000; box-shadow:0 10px 40px rgba(0,0,0,.5);}
.finale-image{padding:10px; border-radius:22px; background:linear-gradient(135deg, #ffe29a, #5b8def 45%, #9b6fd4 72%, #5fbf77); box-shadow:0 0 55px rgba(244,201,93,.65), 0 18px 50px rgba(0,0,0,.45);}
.finale-image .ai-img{border-color:#fff1bd; box-shadow:0 0 30px rgba(255,255,255,.35);}
.ai-img img{width:100%; height:100%; object-fit:cover; display:block;}
.phase-image{margin:10px auto 16px;}
.phase-image .ai-img{max-height:260px;}
.ai-placeholder{
  width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:12px; padding:18px; text-align:center;
}
.ai-placeholder .emoji{font-size:clamp(3rem,10vw,6rem); filter:drop-shadow(0 0 18px rgba(255,255,255,.4));}
.ai-placeholder .desc{font-size:.85rem; color:rgba(255,255,255,.85); font-style:italic; max-width:420px;}
.ai-placeholder .tag{font-size:.65rem; letter-spacing:.2em; text-transform:uppercase; color:rgba(255,255,255,.5); border:1px solid rgba(255,255,255,.3); padding:3px 10px; border-radius:99px;}

/* ===== Enthüllung ===== */
.reveal-box{position:relative;}
.reveal-cover{position:absolute; inset:0; display:grid; grid-template-columns:repeat(6,1fr); grid-template-rows:repeat(4,1fr);}
.reveal-cover .tile{background:var(--lead); border:1px solid #1c2140; transition:opacity .5s;}
.reveal-cover .tile.off{opacity:0;}

/* ===== Antwort-Buttons (Team) ===== */
.answers{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px;}
.answers.one-col{grid-template-columns:1fr;}
.ans-btn{
  border:none; border-radius:14px; padding:18px 14px; font-size:1.05rem; cursor:pointer; color:#fff;
  min-height:74px; box-shadow:0 4px 0 rgba(0,0,0,.4); transition:transform .08s, filter .2s; text-align:center;
}
.ans-btn:active{transform:translateY(3px);}
.ans-btn.a0{background:var(--glass-red);} .ans-btn.a1{background:var(--glass-blue);}
.ans-btn.a2{background:var(--w1);} .ans-btn.a3{background:var(--glass-green);}
.ans-btn.chosen{outline:4px solid #fff;}
.ans-btn.dim{filter:brightness(.35);}
.ans-btn.correct{outline:4px solid var(--gold); filter:brightness(1.15);}

/* ===== Tafel: Antwort-Anzeige ===== */
.board-answers{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:18px;}
.board-ans{border-radius:14px; padding:18px 20px; font-size:clamp(1rem,2.2vw,1.5rem); color:#fff; position:relative; overflow:hidden; min-height:64px; display:flex; align-items:center; box-shadow:0 6px 20px rgba(0,0,0,.35);}
.board-ans .cnt{margin-left:auto; background:rgba(0,0,0,.35); border-radius:99px; padding:4px 14px; font-size:1rem;}
.board-ans.dim{filter:brightness(.3);}
.board-ans.correct{outline:4px solid var(--gold);}

/* ===== Teams / Punkte ===== */
.team-chip{display:flex; align-items:center; gap:8px; background:var(--panel2); border-radius:99px; padding:8px 16px; font-size:1rem; border:1px solid #3a4180;}
.team-chip .emblem{font-size:1.3rem;}
.scoreboard{display:flex; flex-direction:column; gap:10px; margin-top:14px;}
.score-row{display:flex; align-items:center; gap:12px; background:var(--panel2); border-radius:12px; padding:10px 16px; transition:transform .6s;}
.score-row .emblem{font-size:1.5rem;}
.score-row .name{font-size:1.1rem;}
.score-row .pts{margin-left:auto; color:var(--gold); font-size:1.2rem; font-variant-numeric:tabular-nums;}
.score-row .delta{color:var(--glass-green); font-size:.95rem; margin-left:10px;}

/* ===== Fortschritts-Rennen ===== */
.race{display:flex; flex-direction:column; gap:14px; margin-top:18px;}
.race-row{display:flex; align-items:center; gap:10px;}
.race-row .emblem{font-size:1.4rem; width:36px; text-align:center;}
.race-track{flex:1; height:26px; background:var(--panel2); border-radius:99px; position:relative; overflow:hidden;}
.race-fill{height:100%; border-radius:99px; background:linear-gradient(90deg,var(--gold),var(--gold2)); width:0%; transition:width .4s ease; box-shadow:0 0 14px rgba(244,201,93,.5);}
.race-row.done .race-fill{background:linear-gradient(90deg,var(--glass-green),#a5e8b5);}

/* ===== Sortieren (Team) ===== */
.sort-list{display:flex; flex-direction:column; gap:8px; margin-top:14px;}
.sort-item{background:var(--panel2); border:1px solid #3a4180; border-radius:12px; padding:12px 14px; display:flex; align-items:center; gap:10px; font-size:1rem; user-select:none;}
.sort-item .num{background:var(--lead); border-radius:8px; min-width:30px; text-align:center; padding:4px 0; color:var(--gold); font-variant-numeric:tabular-nums;}
.sort-item .updown{margin-left:auto; display:flex; gap:6px;}
.sort-item button{background:var(--panel); color:var(--text); border:1px solid #3a4180; border-radius:8px; width:40px; height:40px; font-size:1.2rem; cursor:pointer;}
.sort-item.locked{opacity:.7;}

/* ===== Timer ===== */
.timerbar{height:10px; background:var(--panel2); border-radius:99px; overflow:hidden; margin:14px 0;}
.timerbar .fill{height:100%; background:linear-gradient(90deg,var(--glass-red),var(--gold)); width:100%; transition:width .25s linear;}
.timer-num{font-size:clamp(1.6rem,4vw,2.6rem); color:var(--gold); text-align:center; font-variant-numeric:tabular-nums;}

/* ===== Kreativ/Voting ===== */
.free-input{width:100%; background:var(--panel2); border:1px solid #3a4180; color:var(--text); border-radius:12px; padding:14px; font-size:1.05rem; font-family:inherit; resize:none; min-height:90px;}
.vote-card{background:var(--panel2); border:1px solid #3a4180; border-radius:14px; padding:16px 18px; font-size:clamp(1rem,2vw,1.3rem); font-style:italic; position:relative;}
.vote-card .votes{position:absolute; top:-10px; right:-6px; background:var(--gold); color:var(--lead); border-radius:99px; padding:3px 12px; font-size:.95rem; font-style:normal;}
.vote-card.mine{outline:2px dashed var(--muted);}

/* ===== Lobby ===== */
.roomcode{font-size:clamp(2.6rem,8vw,5rem); letter-spacing:.4em; color:var(--gold); text-align:center; text-shadow:0 0 24px rgba(244,201,93,.4); font-variant-numeric:tabular-nums;}
.emblem-pick{display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin:12px 0;}
.emblem-pick button{font-size:1.8rem; background:var(--panel2); border:2px solid #3a4180; border-radius:14px; width:60px; height:60px; cursor:pointer;}
.emblem-pick button.sel{border-color:var(--gold); background:#2e3567;}
.emblem-pick button.taken{opacity:.25; pointer-events:none;}
input.text{background:var(--panel2); border:1px solid #3a4180; color:var(--text); border-radius:12px; padding:14px; font-size:1.2rem; font-family:inherit; width:100%; text-align:center;}
input.code{letter-spacing:.4em; text-transform:uppercase; font-size:1.6rem;}

/* ===== Host-Steuerleiste ===== */
#hostbar{position:fixed; bottom:0; left:0; right:0; background:rgba(10,12,24,.92); backdrop-filter:blur(6px); border-top:1px solid #333a6e; padding:10px 14px; display:flex; gap:10px; align-items:center; z-index:50;}
#hostbar .info{color:var(--muted); font-size:.9rem;}
body.is-host #app{padding-bottom:90px;}
body.is-team{overflow:hidden;}
body.is-team #app{height:100vh; min-height:100vh; padding:10px; overflow-y:auto; scrollbar-width:none;}
body.is-team #app::-webkit-scrollbar{display:none;}
body.is-team .phase-image{margin:0 auto 8px;}
body.is-team .phase-image .ai-img{max-height:110px;}
body.is-team .panel{padding:13px; border-radius:13px;}
body.is-team .team-chip{padding:6px 10px; font-size:.9rem;}
body.is-team .answers{gap:8px; margin-top:10px;}
body.is-team .ans-btn{min-height:52px; padding:11px 9px; font-size:.98rem;}
body.is-team .clue-list{gap:7px; margin:8px auto;}
body.is-team .clue-item{padding:9px 11px; font-size:.94rem;}
#version-badge{position:fixed; right:12px; bottom:10px; z-index:55; padding:4px 9px; border:1px solid rgba(244,201,93,.45); border-radius:999px; background:rgba(10,12,24,.78); color:var(--muted); font:12px/1.2 Georgia,'Times New Roman',serif; letter-spacing:.04em; pointer-events:none;}
body.is-host #version-badge{bottom:76px;}

/* ===== Welt-Header ===== */
.world-banner{display:flex; align-items:center; gap:16px; justify-content:center; margin-bottom:14px;}
.world-banner .icon{font-size:2.2rem;}
.world-banner .wname{font-size:clamp(1.2rem,3vw,2rem); letter-spacing:.12em;}
.world-tag{font-size:.75rem; letter-spacing:.25em; text-transform:uppercase; color:var(--muted); text-align:center; margin-bottom:4px;}
.clue-list{display:flex; flex-direction:column; gap:10px; margin:14px auto; max-width:720px;}
.clue-item{background:var(--panel2); border:1px solid #5665a0; border-radius:12px; padding:13px 16px; line-height:1.45;}
.clue-item.current{border-color:var(--gold); box-shadow:0 0 16px rgba(244,201,93,.18);}
.team-guide{display:flex; align-items:center; gap:9px; min-width:0;}
.team-guide img{width:42px; height:42px; object-fit:cover; border-radius:50%; border:2px solid var(--gold); box-shadow:0 0 12px rgba(244,201,93,.28);}
.team-guide .team-guide-copy{display:flex; flex-direction:column; gap:2px; min-width:0;}
.team-guide .guide-label{font-size:.68rem; color:var(--muted); letter-spacing:.08em; text-transform:uppercase;}
.avatar-badge{width:38px; height:38px; object-fit:cover; border-radius:50%; border:2px solid var(--gold); vertical-align:middle;}
.avatar-pick{display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin:12px 0;}
.avatar-option{background:var(--panel2); color:var(--text); border:2px solid #3a4180; border-radius:13px; padding:7px 4px; cursor:pointer; font-family:inherit; font-size:.78rem;}
.avatar-option img{display:block; width:58px; height:58px; object-fit:cover; border-radius:50%; margin:0 auto 5px;}
.avatar-option.sel{border-color:var(--gold); box-shadow:0 0 14px rgba(244,201,93,.3);}
.avatar-option.taken{opacity:.25; pointer-events:none;}
.avatar-ability{display:block; color:var(--muted); font-size:.68rem; line-height:1.25; margin-top:3px;}
.points-change{font-size:.82rem; font-weight:bold; animation:pointsPop .55s ease-out;}
.points-change.plus{color:var(--glass-green);}
.points-change.minus{color:var(--glass-red);}
@keyframes pointsPop{0%{opacity:0; transform:translateY(6px) scale(.9);}60%{opacity:1; transform:translateY(-2px) scale(1.05);}100%{opacity:1; transform:translateY(0) scale(1);}}

/* ===== Feedback-Overlays (Team) ===== */
.flash{position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; z-index:40; font-size:1.6rem; text-align:center; padding:20px;}
.flash.ok{background:rgba(35,110,60,.96);}
.flash.bad{background:rgba(140,47,59,.96);}
.flash.wait{background:rgba(20,24,48,.96);}
.flash .big-ico{font-size:4rem;}

/* ===== Konfetti ===== */
#confetti{position:fixed; inset:0; pointer-events:none; z-index:60;}

/* ===== Podium ===== */
.podium{display:flex; align-items:flex-end; justify-content:center; gap:14px; margin-top:26px; min-height:260px;}
.podium .col{display:flex; flex-direction:column; align-items:center; gap:10px; width:130px;}
.podium .block{width:100%; border-radius:12px 12px 0 0; background:linear-gradient(180deg,var(--panel2),var(--panel)); border:1px solid #3a4180; display:flex; align-items:center; justify-content:center; color:var(--gold); font-size:1.6rem;}
.podium .col.p1 .block{height:170px; background:linear-gradient(180deg,#6d5b1e,var(--panel));}
.podium .col.p2 .block{height:120px;}
.podium .col.p3 .block{height:85px;}
.podium .who{font-size:1.05rem; text-align:center;}
.podium .who .emblem{font-size:2rem; display:block;}

@media (max-width:640px){
  .answers{grid-template-columns:1fr;}
  .board-answers{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<canvas id="confetti"></canvas>
<div id="hostbar" class="hidden"></div>

<script>
/* ============================================================

   2) Settings → API: "Project URL" und "anon public"-Key kopieren
   3) Unten einfügen. Bleiben die Felder leer, startet das Spiel
      im NOTFALLMODUS (Tafel allein, Antworten per Handzeichen).
   ============================================================ */
const SUPABASE_URL = "https://xeqzioibjztjvscpdbrm.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_ubP_iCK_eNkBgGGzFmrIDw_CmDOP09D";

/* ============================================================
   KURS-INSIDER (optional): Hier eigene Spaßfragen ergänzen.
   Format wie unten – sie werden automatisch als Bonusfragen
   in das Blitzquiz der passenden Welt gemischt (world:1-4).
   ============================================================ */
const INSIDER = [

];

/* ============ KI-BILDER ============
   Die Dateien werden aus dem Unterordner img/ geladen (img/<id>.png).
   Fehlt eine Datei, zeigt das Spiel automatisch einen stimmigen
   Platzhalter mit der Bildbeschreibung an – voll spielbar.

   "Moderne Glasmalerei / Stained-Glass-Illustration, leuchtende
    Farben auf dunklem Grund, klare schwarze Bleilinien, feierlich,

const AI_IMAGES = {

  "quiz-sturm":        {emoji:"🌪️", desc:"Gewaltiger blauer Sturm über dem Meer, eine kleine Gestalt steht im warmen Licht"},
  "epikur-werkstatt":  {emoji:"⚖️", desc:"Leuchtende Waage mit Flamme und dunklem Stein, umgeben von vier Denkwegen"},

};

/* ============ SPIEL-DATEN ============ */
const WORLDS = [
  {id:1, name:"Der Dornbusch",        tag:"Biblisches Sprechen von Gott", icon:"🔥", color:"var(--w1)", paneClass:"w1"},

const shuffle = arr => { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; };
function answerColorIndex(i, sub){
  const order = Array.isArray(sub?.answerColors) && sub.answerColors.length ? sub.answerColors : [1,2,3,0];
  return order[i] ?? (i%4);
}

let role = null;          // 'host' | 'team'

/* ---------- Sound (WebAudio, ohne Dateien) ---------- */
let AC = null;
let musicTimer = null, musicGain = null;
function ac(){ if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==="suspended") AC.resume(); return AC; }
function tone(freq, dur, type="sine", vol=0.18, when=0){
  if(!soundOn) return;
  try{
    const ctx = ac(), o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime + when);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + when + dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(ctx.currentTime + when); o.stop(ctx.currentTime + when + dur + .05);
  }catch(e){}
}
const sfx = {
  tick(){ tone(880, .06, "square", .05); },
  join(){ tone(523,.1); tone(659,.12,"sine",.18,.09); },
  correct(){ tone(523,.12); tone(659,.12,"sine",.2,.1); tone(784,.25,"sine",.2,.2); },
  wrong(){ tone(196,.3,"sawtooth",.12); tone(147,.4,"sawtooth",.1,.15); },
  reveal(){ tone(440,.15,"triangle",.15); tone(554,.2,"triangle",.15,.12); },
  fanfare(){ [523,659,784,1047].forEach((f,i)=>tone(f,.4,"triangle",.22,i*.18)); tone(1319,.9,"triangle",.25,.75); },
  whoosh(){ tone(220,.25,"sawtooth",.06); tone(330,.25,"sawtooth",.06,.08); },
};
function playMusicNote(freq, duration=2.4){
  if(!soundOn) return;
  try{
    const ctx=ac(), o=ctx.createOscillator(), g=ctx.createGain(), now=ctx.currentTime;
    o.type="sine"; o.frequency.value=freq;
    g.gain.setValueAtTime(0.0001,now); g.gain.linearRampToValueAtTime(0.035,now+0.35);
    g.gain.setValueAtTime(0.035,now+duration-0.45); g.gain.exponentialRampToValueAtTime(0.0001,now+duration);
    o.connect(g); g.connect(musicGain||ctx.destination); o.start(now); o.stop(now+duration+0.05);
  }catch(e){}
}
function startMusic(){
  if(!soundOn || !ambientMusic) return;
  ambientMusic.volume=.22;
  ambientMusic.play().catch(()=>{});
}
function stopMusic(){ if(ambientMusic){ ambientMusic.pause(); ambientMusic.currentTime=0; } }
function toggleSound(){ soundOn=!soundOn; if(soundOn){ if(role==="host") startMusic(); } else stopMusic(); hostRender(); }

/* ---------- Konfetti ---------- */
const confettiCv = $("#confetti"), cfx = confettiCv.getContext("2d");
let confParts = [], confRunning = false;
function resizeConf(){ confettiCv.width = innerWidth; confettiCv.height = innerHeight; }
addEventListener("resize", resizeConf); resizeConf();
function confettiBurst(n=180){
  const colors = ["#f4c95d","#e05263","#5b8def","#5fbf77","#9b6fd4","#ffe29a"];
  for(let i=0;i<n;i++) confParts.push({
    x:Math.random()*confettiCv.width, y:-20-Math.random()*confettiCv.height*.4,
    w:6+Math.random()*7, h:8+Math.random()*10, c:colors[i%colors.length],
    vy:2+Math.random()*3.2, vx:-1.5+Math.random()*3, rot:Math.random()*Math.PI, vr:-.12+Math.random()*.24
  });
  if(!confRunning){ confRunning=true; requestAnimationFrame(confStep); }
}
function confStep(){
  cfx.clearRect(0,0,confettiCv.width,confettiCv.height);
  confParts.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
    cfx.save(); cfx.translate(p.x,p.y); cfx.rotate(p.rot); cfx.fillStyle=p.c; cfx.fillRect(-p.w/2,-p.h/2,p.w,p.h); cfx.restore(); });
  confParts = confParts.filter(p=>p.y < confettiCv.height+30);
  if(confParts.length){ requestAnimationFrame(confStep); } else { confRunning=false; }
}

/* ---------- Netzwerk ---------- */
function makeCode(){ const A="ABCDEFGHKLMNPRSTUWXYZ"; let c=""; for(let i=0;i<4;i++) c+=A[Math.floor(Math.random()*A.length)]; return c; }
function connect(code, onMsg, onReady){
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  NET = sb.channel("lumen-"+code, {config:{broadcast:{self:false}}});
  NET.on("broadcast", {event:"msg"}, ({payload}) => onMsg(payload));
  NET.subscribe(status => { if(status === "SUBSCRIBED" && onReady) onReady(); });
}
function send(payload){ if(NET) NET.send({type:"broadcast", event:"msg", payload}); }

/* ---------- Timer-Anzeige ---------- */
let timerInterval = null;
function stopTimerUI(){ if(timerInterval){ clearInterval(timerInterval); timerInterval=null; } }
function runTimerUI(deadline, total, onZero){
  stopTimerUI();
  const fill = $("#tfill"), num = $("#tnum");
  function step(){
    const left = Math.max(0, deadline - Date.now());
    if(fill) fill.style.width = (100*left/(total*1000)) + "%";
    if(num){ const s = Math.ceil(left/1000); if(num.textContent != s){ num.textContent = s; if(s<=5 && s>0) sfx.tick(); } }
    if(left<=0){ stopTimerUI(); if(onZero) onZero(); }
  }
  step(); timerInterval = setInterval(step, 200);
}
function timerHtml(){ return `<div class="timerbar"><div class="fill" id="tfill"></div></div><div class="timer-num" id="tnum"></div>`; }

function teamCount(){ return Object.keys(G.teams).length; }

function broadcastState(){
  if(!ONLINE) return;
  send({ t:"state", pi:G.phaseIdx, sub:G.sub, deadline:G.deadline, total:G.total,
         teams: teamsArr().map(t=>({tid:t.tid,name:t.name,avatarId:t.avatarId,emblem:t.emblem,pts:t.pts,lastDelta:t.lastDelta||0})) });
}

function addPts(tid, delta){
  const t = G.teams[tid]; if(!t) return;
  t.pts = Math.max(0, t.pts + delta); t.lastDelta = delta;
}
function helpCostFor(tid){ return G.teams[tid]?.avatarId==="freud" ? 50 : HELP_COST; }
function claimAvatarBonus(tid, key, amount=50){
  const awardKey=tid+":"+key; if(G.avatarAwards[awardKey]) return 0;
  G.avatarAwards[awardKey]=true; return amount;
}
function resetHelpState(){ G.sub.helpUsed = {}; G.sub.eliminated = {}; }
function handleHelpPurchase(tid, pi){
  if(pi!==G.phaseIdx || !G.sub || G.sub.helpUsed?.[tid]) return;
  const P = PHASES[G.phaseIdx], allowed = ["quiz","reveal","tribunal","finale"].includes(P.type);
  if(!allowed || G.sub.stage!=="ask" && !(P.type==="finale" && ["play","retry"].includes(G.sub.stage))) return;
  const cost=helpCostFor(tid), team = G.teams[tid]; if(!team || team.pts < cost) return;
  const q = P.type==="quiz" ? currentQ() : P.type==="finale" ? P.questions[G.sub.assigned[tid]] : {a:P.options};
  const correct = q.correct;
  const wrong = q.a.map((_,i)=>i).filter(i=>i!==correct && !(G.sub.eliminated?.[tid]||[]).includes(i));
  if(!wrong.length) return;
  addPts(tid, -cost);
  const remove = shuffle(wrong)[0];
  G.sub.helpUsed[tid] = true;
  G.sub.eliminated[tid] = [...(G.sub.eliminated[tid]||[]), remove];
  hostRender(); broadcastState();
}
const BONUS_QUESTIONS = {
  1:{q:"Das Bilderverbot warnt davor, dass …", a:["ein menschengemachtes Bild Gott ersetzt","Gold im Gottesdienst verboten ist","Menschen keine Symbole verwenden dürfen","nur Mose Bilder sehen durfte"], correct:0},
  2:{q:"Welche Frage steht im Zentrum der Theodizee?", a:["Wie kann ein guter und allmächtiger Gott Leid zulassen?","Wie viele Psalmen gibt es?","Wer schrieb die Evangelien?","Wann wurde Jerusalem gegründet?"], correct:0},
  3:{q:"Wer prägte die These, Religion sei eine Projektion menschlicher Wünsche?", a:["Ludwig Feuerbach","Karl Marx","Sigmund Freud","Friedrich Nietzsche"], correct:0},
  4:{q:"Was feiern Christinnen und Christen an Ostern?", a:["Die Auferstehung Jesu","Den Einzug in Jerusalem","Die Taufe Jesu","Die Tempelreinigung"], correct:0}
};
function startBonus(){
  const P=PHASES[G.phaseIdx]; if(P.type!=="world-done" || G.sub.bonus) return;
  const q=BONUS_QUESTIONS[P.world]; if(!q) return;
  G.sub.bonus={stage:"ask", q, answers:{}, winner:null}; G.sub.answerColors=randomAnswerColors(q.a.length);
  hostRender(); broadcastState();
}
function handleBonusAnswer(tid, pi, choice){
  if(pi!==G.phaseIdx || G.sub.bonus?.stage!=="ask" || G.sub.bonus.answers[tid]!==undefined) return;
  const b=G.sub.bonus; b.answers[tid]=choice;
  if(choice===b.q.correct && !b.winner){
    b.winner=tid; const avatarBonus=G.teams[tid].avatarId==="maria-magdalena" ? claimAvatarBonus(tid,"maria-bonus") : 0; addPts(tid,150+avatarBonus); G.awards.bonus.push(tid); b.stage="res"; sfx.fanfare();
  } else if(Object.keys(b.answers).length>=teamCount()){
    b.stage="res"; sfx.reveal();
  }
  hostRender(); broadcastState();
}

function onHostMsg(m){
  if(!m || !m.t) return;
  const P = PHASES[G.phaseIdx];
  if(m.t==="hello"){
    if(!G.teams[m.tid]){
      const used = teamsArr().map(t=>t.avatarId).filter(Boolean);
      const requested = AVATARS.some(a=>a.id===m.avatarId) ? m.avatarId : null;
      const avatarId = requested && !used.includes(requested) ? requested : AVATARS.find(a=>!used.includes(a.id))?.id;
      if(!avatarId) return;
      G.teams[m.tid] = {tid:m.tid, name:String(m.name||"Team").slice(0,18), avatarId, emblem:EMBLEMS[AVATARS.findIndex(a=>a.id===avatarId)%EMBLEMS.length], pts:0, lastDelta:0};
      send({t:"assign", tid:m.tid, avatarId, emblem:G.teams[m.tid].emblem});
      sfx.join();
      if(PHASES[G.phaseIdx].type==="lobby") hostRender();
    }
    broadcastState(); return;
  }
  if(!G.teams[m.tid]) return;

  if(m.t==="help"){
    handleHelpPurchase(m.tid, m.pi); return;
  } else if(m.t==="bonus" && P.type==="world-done"){
    handleBonusAnswer(m.tid, m.pi, m.choice); return;
  } else if(m.t==="ans" && (P.type==="quiz"||P.type==="finale") ){
    handleAnswer(m.tid, m.pi, m.qi, m.choice);
  } else if(m.t==="ans" && (P.type==="reveal"||P.type==="tribunal")){
    handleClueAnswer(m.tid, m.pi, m.choice);
  } else if(m.t==="prog" && P.type==="sort"){
    handleProgress(m.tid, m.pi, m.correct, m.done);
  } else if(m.t==="txt" && P.type==="creative"){
    handleText(m.tid, m.pi, m.text);
  } else if(m.t==="vote" && P.type==="vote"){
    handleVote(m.tid, m.pi, m.key);
  }
}

/* ---------- Phasen-Eintritt ---------- */
function enterPhase(idx){
  stopTimerUI();
  G.phaseIdx = idx;
  const P = PHASES[idx];
  G.deadline = 0; G.total = 0;
  teamsArr().forEach(t=>t.lastDelta=0);

  if(P.type==="quiz"){ G.sub = {qi:0, stage:"ask", counts:[], answers:{}}; startQuestion(); return; }
  if(P.type==="reveal"||P.type==="tribunal"){
    G.sub = {step:0, stage:"ask", locked:[], answered:{}, winner:null, fCounts:[], fAnswers:{}};
    G.sub.answerColors = randomAnswerColors(P.options.length); resetHelpState(); setDeadline(P.time); hostRender(); broadcastState(); return;
  }
  if(P.type==="sort"){
    G.sub = {stage:"work", prog:{}, finished:[]};
    setDeadline(P.time); hostRender(); broadcastState(); return;
  }
  if(P.type==="creative"){
    const assigned = {};
    teamsArr().forEach((t,i)=>assigned[t.tid] = i % P.prompts.length);
    G.sub = {stage:"write", assigned, texts:{}};
    setDeadline(P.time); hostRender(); broadcastState(); return;
  }
  if(P.type==="vote"){
    const texts = (G.creative && G.creative.texts) || {};
    const entries = shuffle(Object.keys(texts).map(tid=>({key:tid, text:texts[tid]})));
    G.sub = {stage:"vote", entries, votes:{}};
    if(entries.length===0){ G.sub.stage="res"; G.sub.results={}; }
    else setDeadline(P.time);
    hostRender(); broadcastState(); return;
  }
  if(P.type==="finale"){
    const assigned = {};
    teamsArr().forEach((t,i)=>assigned[t.tid] = i % P.questions.length);
    G.sub = {stage:"play", assigned, results:{}, round:1, answerColors:randomAnswerColors(P.questions[0].a.length)};
    resetHelpState();
    setDeadline(P.time); hostRender(); broadcastState(); return;
  }
  G.sub = {};
  hostRender(); broadcastState();
  if(P.type==="world-done"){ sfx.reveal; sfx.reveal(); }
  if(P.type==="ceremony"){ computeAwards(); sfx.fanfare(); confettiBurst(220); hostRender(); broadcastState(); }
}

function setDeadline(sec){ G.total = sec; G.deadline = Date.now() + sec*1000; }
function extendTime(sec){ if(G.deadline){ G.deadline += sec*1000; hostRender(); broadcastState(); } }

/* ---------- Quiz ---------- */
function currentQ(){ const P=PHASES[G.phaseIdx]; return P.questions[G.sub.qi]; }
function startQuestion(){
  const P = PHASES[G.phaseIdx];
  G.sub.stage = "ask"; G.sub.answers = {}; G.sub.counts = []; G.sub.answerColors = randomAnswerColors(P.questions[G.sub.qi].a.length); resetHelpState();
  teamsArr().forEach(t=>t.lastDelta=0);
  setDeadline(P.time);
  sfx.whoosh();
  hostRender(); broadcastState();
}
function handleAnswer(tid, pi, qi, choice){
  if(pi!==G.phaseIdx) return;
  const P = PHASES[G.phaseIdx];
  if(P.type==="quiz"){
    if(G.sub.stage!=="ask" || qi!==G.sub.qi || G.sub.answers[tid]!==undefined) return;
    const remaining = Math.max(0, G.deadline - Date.now());
    G.sub.answers[tid] = {choice, remaining};
    if(Object.keys(G.sub.answers).length >= teamCount()) resolveQuestion();
    else { hostRender(); broadcastState(); }
  }
  if(P.type==="finale"){
    if((G.sub.stage!=="play" && G.sub.stage!=="retry") || G.sub.results[tid]===true) return;
    const q = P.questions[G.sub.assigned[tid]];
    G.sub.results[tid] = (choice === q.correct);
    if(G.sub.results[tid] && G.teams[tid].avatarId==="jesus") addPts(tid,claimAvatarBonus(tid,"jesus-finale",100));
    const vals = teamsArr().map(t=>G.sub.results[t.tid]);
    if(vals.every(v=>v===true)) finaleWon();
    else if(vals.every(v=>v!==undefined && v!==null)) { hostRender(); broadcastState(); }
    else { hostRender(); broadcastState(); }
  }
}
function resolveQuestion(){
  stopTimerUI();
  const P = PHASES[G.phaseIdx], q = currentQ();
  const counts = new Array(q.a.length).fill(0);
  let fastBest = null;
  Object.entries(G.sub.answers).forEach(([tid,a])=>{
    counts[a.choice]++;
    if(a.choice===q.correct){
      const bonus = Math.round(100 * a.remaining / (G.total*1000));
      const avatarBonus = P.world===1 && G.teams[tid].avatarId==="mose" ? claimAvatarBonus(tid,"mose-w1") : P.world===2 && G.teams[tid].avatarId==="hiob" ? claimAvatarBonus(tid,"hiob-w2") : P.world===3 && G.teams[tid].avatarId==="marx" ? claimAvatarBonus(tid,"marx-w3") : 0;
      addPts(tid, 100 + bonus + avatarBonus);
      if(!fastBest || a.remaining > fastBest.remaining) fastBest = {tid, remaining:a.remaining};
      if(!G.awards.fastest || a.remaining > G.awards.fastest.remaining) G.awards.fastest = {tid, remaining:a.remaining};
    }
  });
  G.sub.counts = counts; G.sub.stage = "res";
  G.deadline = 0;
  sfx.reveal();
  hostRender(); broadcastState();
}

/* ---------- Reveal / Tribunal ---------- */
const CLUE_PTS = [300,200,100];
function handleClueAnswer(tid, pi, choice){
  if(pi!==G.phaseIdx) return;
  const P = PHASES[G.phaseIdx];
  if(G.sub.stage==="ask"){
    if(G.sub.locked.includes(tid) || G.sub.answered[tid]!==undefined) return;
    G.sub.answered[tid] = choice;
    if(choice === P.correct){
      G.sub.winner = tid;
      const avatarBonus = P.title==="Der erste Angeklagte" && G.teams[tid].avatarId==="feuerbach" ? claimAvatarBonus(tid,"feuerbach-tribunal") : P.title==="Der zweite Angeklagte" && G.teams[tid].avatarId==="nietzsche" ? claimAvatarBonus(tid,"nietzsche-tribunal") : 0;
      addPts(tid, CLUE_PTS[Math.min(G.sub.step, 2)] + avatarBonus);
      G.sub.stage = "res"; G.deadline = 0; stopTimerUI();
      sfx.correct();
    } else {
      addPts(tid, -50);
      G.sub.locked.push(tid);
      sfx.wrong();
      if(G.sub.locked.length >= teamCount()){ G.sub.stage="res"; G.deadline=0; stopTimerUI(); }
    }
    hostRender(); broadcastState();
  } else if(G.sub.stage==="follow"){
    if(G.sub.fAnswers[tid]!==undefined) return;
    const remaining = Math.max(0, G.deadline - Date.now());
    G.sub.fAnswers[tid] = {choice, remaining};
    if(Object.keys(G.sub.fAnswers).length >= teamCount()) resolveFollow();
    else { hostRender(); broadcastState(); }
  }
}
function nextClue(){
  const P = PHASES[G.phaseIdx];
  if(G.sub.step < 2){
    G.sub.step++; G.sub.answerColors = randomAnswerColors(P.options.length); resetHelpState(); setDeadline(P.time); sfx.whoosh();
  } else { G.sub.stage = "res"; G.deadline = 0; stopTimerUI(); }
  hostRender(); broadcastState();
}
function startFollow(){
  const P = PHASES[G.phaseIdx];
  if(!P.follow){ hostAdvancePhase(); return; }
  G.sub.stage = "follow"; G.sub.fAnswers = {}; G.sub.answerColors = randomAnswerColors(P.follow.a.length); resetHelpState();
  setDeadline(P.follow.time || 25);
  hostRender(); broadcastState();
}
function resolveFollow(){
  stopTimerUI();
  const P = PHASES[G.phaseIdx], q = P.follow;
  const counts = new Array(q.a.length).fill(0);
  Object.entries(G.sub.fAnswers).forEach(([tid,a])=>{
    counts[a.choice]++;
    if(a.choice===q.correct){
      addPts(tid, 100 + Math.round(100*a.remaining/(G.total*1000)));
      if(!G.awards.fastest || a.remaining > G.awards.fastest.remaining) G.awards.fastest = {tid, remaining:a.remaining};
    }
  });
  G.sub.fCounts = counts; G.sub.stage = "fres"; G.deadline = 0;
  sfx.reveal();
  hostRender(); broadcastState();
}

/* ---------- Sortierung ---------- */
function handleProgress(tid, pi, correct, done){
  if(pi!==G.phaseIdx || G.sub.stage!=="work") return;
  const P = PHASES[G.phaseIdx];
  G.sub.prog[tid] = {correct, done: !!done};
  if(done && !G.sub.finished.includes(tid)){
    G.sub.finished.push(tid);
    sfx.correct();
  }
  if(G.sub.finished.length >= teamCount()) resolveSort();
  else { hostRender(); broadcastState(); }
}
function resolveSort(){
  stopTimerUI();
  const P = PHASES[G.phaseIdx];
  const rankPts = [300,200,150,120,100,100];
  G.sub.finished.forEach((tid,i)=>{
    const avatarBonus=i===0 && G.teams[tid].avatarId==="petrus" ? claimAvatarBonus(tid,"petrus-sort") : 0;
    addPts(tid, rankPts[Math.min(i,rankPts.length-1)] + avatarBonus);
  });
  teamsArr().forEach(t=>{
    if(!G.sub.finished.includes(t.tid)){
      const pr = G.sub.prog[t.tid];
      addPts(t.tid, pr ? Math.round(100 * pr.correct / P.items.length) : 0);
    }
  });
  G.sub.stage = "res"; G.deadline = 0;
  sfx.reveal();
  hostRender(); broadcastState();
}

/* ---------- Kreativ & Voting ---------- */
function handleText(tid, pi, text){
  if(pi!==G.phaseIdx || G.sub.stage!=="write") return;
  G.sub.texts[tid] = String(text||"").slice(0,220);
  sfx.join();
  if(Object.keys(G.sub.texts).length >= teamCount()){
    G.sub.stage = "done"; G.deadline = 0; stopTimerUI();
    G.creative = {texts: G.sub.texts, assigned: G.sub.assigned};
  }
  hostRender(); broadcastState();
}
function handleVote(tid, pi, key){
  if(pi!==G.phaseIdx || G.sub.stage!=="vote") return;
  if(key===tid || G.sub.votes[tid]!==undefined) return;
  G.sub.votes[tid] = key;
  sfx.join();
  if(Object.keys(G.sub.votes).length >= teamCount()) resolveVote();
  else { hostRender(); broadcastState(); }
}
function resolveVote(){
  stopTimerUI();
  const results = {};
  Object.values(G.sub.votes).forEach(key=>{ results[key] = (results[key]||0)+1; });
  Object.entries(results).forEach(([key,n])=>{
    const avatarBonus=G.teams[key]?.avatarId==="epikur" && n>0 ? claimAvatarBonus(key,"epikur-vote") : 0;
    addPts(key, n*100 + avatarBonus);
  });
  let best=null; Object.entries(results).forEach(([key,n])=>{ if(!best || n>best.n) best={key,n}; });
  if(best) G.awards.poet = best.key;
  G.sub.results = results; G.sub.stage = "res"; G.deadline = 0;
  sfx.fanfare();
  hostRender(); broadcastState();
}

/* ---------- Finale ---------- */
function finaleWon(){
  stopTimerUI();
  G.sub.stage = "won"; G.deadline = 0;
  sfx.fanfare(); confettiBurst(260);
  hostRender(); broadcastState();
}
function finaleRetry(){
  const P = PHASES[G.phaseIdx];
  teamsArr().forEach(t=>{ if(G.sub.results[t.tid]!==true) delete G.sub.results[t.tid]; });
  G.sub.stage = "retry"; G.sub.round++;
  setDeadline(60);
  hostRender(); broadcastState();
}

function computeAwards(){ /* fastest & poet werden unterwegs gesammelt */ }

/* ---------- Host: Weiter-Logik ---------- */
function hostAdvancePhase(){ if(G.phaseIdx < PHASES.length-1) enterPhase(G.phaseIdx+1); }
function hostNext(){
  const P = PHASES[G.phaseIdx];
  if(P.type==="quiz"){
    if(G.sub.stage==="ask"){ resolveQuestion(); return; }
    if(G.sub.qi < P.questions.length-1){ G.sub.qi++; startQuestion(); return; }
    hostAdvancePhase(); return;
  }
  if(P.type==="reveal"||P.type==="tribunal"){
    if(G.sub.stage==="ask"){ nextClue(); return; }
    if(G.sub.stage==="res"){ startFollow(); return; }
    if(G.sub.stage==="follow"){ resolveFollow(); return; }
    hostAdvancePhase(); return;
  }
  if(P.type==="sort"){
    if(G.sub.stage==="work"){ resolveSort(); return; }
    hostAdvancePhase(); return;
  }
  if(P.type==="creative"){
    if(G.sub.stage==="write"){
      G.sub.stage="done"; G.creative={texts:G.sub.texts, assigned:G.sub.assigned};
      G.deadline=0; stopTimerUI(); hostRender(); broadcastState(); return;
    }
    hostAdvancePhase(); return;
  }
  if(P.type==="vote"){
    if(G.sub.stage==="vote"){ resolveVote(); return; }
    hostAdvancePhase(); return;
  }
  if(P.type==="finale"){
    if(G.sub.stage==="play"||G.sub.stage==="retry"){ finaleRetry(); return; }
    hostAdvancePhase(); return;
  }
  if(P.type==="world-done"){
    if(G.sub.bonus?.stage==="ask"){ hostRender(); return; }
    hostAdvancePhase(); return;
  }
  hostAdvancePhase();
}

      </div>
      ${done?`<h2 style="margin-top:14px;">${esc(P.solution)}</h2>`:""}`;
    } else {
      center = `<div class="panel" style="max-width:720px; margin:0 auto;">
        ${P.clues.slice(0, done?3:G.sub.step+1).map(c=>`<p style="font-size:1.25rem; margin:10px 0;">🔎 ${esc(c)}</p>`).join("")}
        ${done?`<h2 style="margin-top:10px; color:var(--gold);">→ ${esc(P.options[P.correct])}</h2>`:""}
      </div>`;
    }
    let bottom = "";
    if(G.sub.stage==="ask"){
      bottom = `<div class="board-answers">${P.options.map((o,i)=>`<div class="board-ans a${answerColorIndex(i,G.sub)}" style="background:${ANSWER_COLORS[answerColorIndex(i,G.sub)]}">${["🟥","🟦","🟧","🟩"][answerColorIndex(i,G.sub)]} ${esc(o)}</div>`).join("")}</div>
        ${answeredChipsHtml(G.sub.answered)}
        <p class="center" style="color:var(--muted); margin-top:10px;">Früh antworten bringt ${CLUE_PTS[Math.min(G.sub.step,2)]} Punkte – falsch kostet 50 und sperrt!</p>`;
      barExtra = `<button class="btn small secondary" onclick="nextClue()">${isRev?"Mehr aufdecken":"Nächstes Indiz"} 🔎</button>`;
    }
    if(G.sub.stage==="res"){
      const w = G.sub.winner ? G.teams[G.sub.winner] : null;
      bottom = `<h2 style="margin-top:14px;">${w?`${w.emblem} ${esc(w.name)} hat es erkannt! +${CLUE_PTS[Math.min(G.sub.step,2)]}`:"Niemand hat es erkannt …"}</h2>`;
    }
    if(G.sub.stage==="follow"){
      bottom = `${timerHtml()}<h2 style="margin:14px 0;">${esc(P.follow.q)}</h2>${boardAnswersHtml(P.follow, null, false)}${answeredChipsHtml(G.sub.fAnswers)}`;
    }
    if(G.sub.stage==="fres"){
      bottom = `<h2 style="margin:14px 0;">${esc(P.follow.q)}</h2>${boardAnswersHtml(P.follow, {counts:G.sub.fCounts}, true)}${scoreboardHtml(teamsArr(), true)}`;
    }
    html = `${worldBanner(P.world)}
      <div class="center" style="color:var(--muted); letter-spacing:.15em;">${esc(P.title || "Die Enthüllung")}</div>
      ${G.sub.stage==="ask" && G.deadline?timerHtml():""}${center}${bottom}`;
  }

  else if(P.type==="sort"){
    html = `${worldBanner(P.world)}
      <div class="center" style="color:var(--muted); letter-spacing:.15em;">${esc(P.title)}</div>
      ${G.sub.stage==="work" ? timerHtml() : ""}
      <p class="center" style="font-size:1.15rem; margin:10px 0;">${esc(P.intro)}</p>
      <div class="race">${teamsArr().map(t=>{
        const pr = G.sub.prog[t.tid]; const pct = pr ? Math.round(100*pr.correct/P.items.length) : 0;
        const rank = G.sub.finished.indexOf(t.tid);
        return `<div class="race-row ${rank>=0?"done":""}"><span class="emblem">${t.emblem}</span>
          <div class="race-track"><div class="race-fill" style="width:${rank>=0?100:pct}%"></div></div>

      }).join("")}</div>
      ${G.sub.stage==="res" ? `<div class="panel" style="margin-top:18px; max-width:640px; margin-left:auto; margin-right:auto;">
        <b>Die richtige Reihenfolge:</b><ol style="margin:10px 0 0 22px; line-height:1.9;">${P.items.map(i=>`<li>${esc(i)}</li>`).join("")}</ol></div>
        ${scoreboardHtml(teamsArr(), true)}` : ""}`;
  }

  else if(P.type==="creative"){
    html = `${worldBanner(P.world)}
      <div class="center" style="color:var(--muted); letter-spacing:.15em;">${esc(P.title)}</div>
      ${G.sub.stage==="write" && G.deadline ? timerHtml() : ""}
      <p class="center" style="font-size:1.15rem; margin:12px auto; max-width:720px;">${esc(P.intro)}</p>
      <div class="panel" style="max-width:720px; margin:0 auto;">
        ${teamsArr().map(t=>`<p style="margin:8px 0;">${t.emblem} <i style="color:var(--muted)">${esc(P.prompts[G.sub.assigned[t.tid]]||"")}</i>
        ${G.sub.texts[t.tid]!==undefined?" ✅":" ✍️ …"}</p>`).join("")}
      </div>
      ${G.sub.stage==="done"?`<h2 style="margin-top:16px;">Alle Antworten sind da – weiter zum Voting!</h2>`:""}`;
  }

  else if(P.type==="vote"){
    const cre = G.creative || {texts:{},assigned:{}};
    const crePhase = PHASES.find(p=>p.type==="creative");
    if(G.sub.stage==="vote"){
      html = `${worldBanner(P.world)}
        <h2 style="margin-bottom:6px;">Kurs-Voting</h2>
        <p class="center" style="color:var(--muted);">Stimmt auf dem iPad für die beste fremde Antwort!</p>
        ${G.deadline?timerHtml():""}
        <div style="display:flex; flex-direction:column; gap:14px; max-width:800px; margin:14px auto;">
          ${G.sub.entries.map((e,i)=>`<div class="vote-card"><span style="color:var(--gold)">${i+1}.</span>
            <i style="color:var(--muted)">${esc(crePhase.prompts[cre.assigned[e.key]]||"")}</i><br>„${esc(e.text)}“</div>`).join("")}
        </div>${answeredChipsHtml(G.sub.votes)}`;
    } else {
      html = `${worldBanner(P.world)}<h2>Die Ergebnisse!</h2>
        <div style="display:flex; flex-direction:column; gap:14px; max-width:800px; margin:14px auto;">
          ${G.sub.entries.map(e=>{ const t=G.teams[e.key]; const n=(G.sub.results&&G.sub.results[e.key])||0;
            return `<div class="vote-card">„${esc(e.text)}“<br><span style="color:var(--gold); font-style:normal;">${t?t.emblem+" "+esc(t.name):""}</span>
            <span class="votes">${n} ❤ = +${n*100}</span></div>`;}).join("")}
        </div>${scoreboardHtml(teamsArr(), true)}`;
    }
  }

  else if(P.type==="world-done"){
    const lit = [...litWorldsUpTo(), P.world];
    const b = G.sub.bonus;
    html = `${worldBanner(P.world)}
      <h2 style="color:var(--gold); margin-bottom:14px;">✨ Ein Fenster beginnt zu leuchten! ✨</h2>
      ${windowHtml(lit)}
      ${b ? `<div class="panel center" style="max-width:760px; margin:20px auto; border-color:var(--gold);"><h2>🎁 Bonusfrage · +150 Punkte</h2><p style="margin-top:10px;">${esc(b.q.q)}</p>${b.stage==="res" ? `<p style="margin-top:12px; color:var(--gold);">${b.winner ? `${G.teams[b.winner].emblem} ${esc(G.teams[b.winner].name)} gewinnt den Bonus!` : "Niemand hat die Bonusfrage richtig beantwortet."}</p>` : ""}</div>` : ""}
      ${scoreboardHtml(teamsArr())}`;
    sfx.fanfare();
    if(!b) barExtra = `<button class="btn small secondary" onclick="startBonus()">🎁 Bonusfrage starten</button>`;
  }

  else if(P.type==="finale-intro"){
    html = `<h2 style="letter-spacing:.2em; color:var(--gold);">DAS FINALE: ES WERDE LICHT</h2>
      ${windowHtml([1,2,3,4])}
      <div class="panel center" style="max-width:680px; margin:18px auto; font-size:1.15rem; line-height:1.7;">

        <b>Jedes Team bekommt jetzt EINE letzte Frage.</b><br>
        Nur wenn <b style="color:var(--gold)">alle Teams richtig</b> antworten, flutet das Licht den Raum.<br>
        <i style="color:var(--muted)">Keine Punkte. Nur gemeinsam. Ihr habt 90 Sekunden.</i>
      </div>`;
  }

  else if(P.type==="finale"){
    const res = G.sub.results;
    if(G.sub.stage==="won"){
      html = `<div class="center finale-image">${aiImg("finale-fenster","3/4","380px")}</div>
        <h1 style="letter-spacing:.2em; margin-top:14px;">ES WERDE LICHT!</h1>
        <h2 style="color:var(--gold);">Ihr habt es gemeinsam geschafft! 🕯️</h2>
        ${windowHtml([1,2,3,4], true)}`;
    } else {
      html = `<h2 style="letter-spacing:.15em;">FINALE · Versuch ${G.sub.round}</h2>
        ${G.deadline?timerHtml():""}
        <div class="row" style="margin-top:20px;">${teamsArr().map(t=>{
          const r = res[t.tid];
          const state = r===true?"✅":(r===false?"❌":"⏳");
          return `<div class="panel center" style="min-width:150px;"><div style="font-size:2rem;">${t.emblem}</div>
            <div>${esc(t.name)}</div><div style="font-size:2rem; margin-top:6px;">${state}</div></div>`;}).join("")}
        </div>
        ${Object.values(res).includes(false)?`<p class="center" style="margin-top:16px; font-size:1.15rem;">💡 <b>Hilferuf:</b> Teams mit ✅ dürfen laut helfen! Dann „Weiter“ für den nächsten Versuch.</p>`:""}`;
      barExtra = `<button class="btn small secondary" onclick="finaleWon()">Als geschafft werten ✨</button>`;
    }
  }

  else if(P.type==="ceremony"){
    const sorted = [...teamsArr()].sort((a,b)=>b.pts-a.pts);
    const p1=sorted[0], p2=sorted[1], p3=sorted[2];
    const fast = G.awards.fastest ? G.teams[G.awards.fastest.tid] : null;
    const poet = G.awards.poet ? G.teams[G.awards.poet] : null;
    html = `<h1 style="letter-spacing:.2em;">SIEGEREHRUNG</h1>
      <div class="podium">
        ${p2?`<div class="col p2"><div class="who"><span class="emblem">${p2.emblem}</span>${esc(p2.name)}<br><b style="color:var(--gold)">${p2.pts}</b></div><div class="block">🥈</div></div>`:""}
        ${p1?`<div class="col p1"><div class="who"><span class="emblem">${p1.emblem}</span>${esc(p1.name)}<br><b style="color:var(--gold)">${p1.pts}</b></div><div class="block">🥇</div></div>`:""}
        ${p3?`<div class="col p3"><div class="who"><span class="emblem">${p3.emblem}</span>${esc(p3.name)}<br><b style="color:var(--gold)">${p3.pts}</b></div><div class="block">🥉</div></div>`:""}
      </div>
      ${sorted.length>3 ? scoreboardHtml(sorted.slice(3)) : ""}
      <div class="panel" style="max-width:640px; margin:22px auto;">
        <h2 style="margin-bottom:10px;">🏆 Sonder-Awards</h2>
        ${fast?`<p style="margin:8px 0;">⚡ <b>Blitzmerker:</b> ${fast.emblem} ${esc(fast.name)} – schnellste richtige Antwort</p>`:""}
        ${poet?`<p style="margin:8px 0;">🖋️ <b>Poeten-Award:</b> ${poet.emblem} ${esc(poet.name)} – beliebteste Epikur-Antwort</p>`:""}
        <p style="margin:8px 0;">🎁 <b>Tablet-Bonusfragen:</b> Die Bonuspunkte wurden in den Weltpausen auf den Tablets erspielt.</p>
        ${G.awards.bonus.map(tid=>{const t=G.teams[tid]; return t?`<p style="margin:4px 0; color:var(--gold);">→ ${t.emblem} ${esc(t.name)} +150</p>`:"";}).join("")}
      </div>`;
    barExtra = `<button class="btn small secondary" onclick="confettiBurst(200); sfx.fanfare();">🎉 Konfetti</button>`;
  }

  if(!["lobby","world-intro","reveal","tribunal","world-done"].includes(P.type)) html = phaseImg(P) + html;

  app.innerHTML = html;
  hostbarRender(barExtra);

  if(G.deadline){
    runTimerUI(G.deadline, G.total, ()=>{
      const Pn = PHASES[G.phaseIdx];
      if(Pn.type==="quiz" && G.sub.stage==="ask") resolveQuestion();
      else if((Pn.type==="reveal"||Pn.type==="tribunal") && G.sub.stage==="ask") nextClue();
      else if((Pn.type==="reveal"||Pn.type==="tribunal") && G.sub.stage==="follow") resolveFollow();
      else if(Pn.type==="sort" && G.sub.stage==="work") resolveSort();
      else if(Pn.type==="creative" && G.sub.stage==="write") hostNext();
      else if(Pn.type==="vote" && G.sub.stage==="vote") resolveVote();
      else if(Pn.type==="finale" && (G.sub.stage==="play"||G.sub.stage==="retry")){ hostRender(); broadcastState(); }
    });
  }
}
function giveBonus(){
  const name = prompt("Teamname für den Bilderverbot-Bonus (+150):");
  if(!name) return;
  const t = teamsArr().find(x=>x.name.toLowerCase().includes(name.toLowerCase()));
  if(t){ addPts(t.tid,150); G.awards.bonus.push(t.tid); hostRender(); broadcastState(); }
  else alert("Team nicht gefunden.");
}
/* deterministisches Aufdeck-Muster je Phase */
const _revealCache = {};
function revealPattern(pi){
  if(!_revealCache[pi]){ _revealCache[pi] = shuffle(Array.from({length:24},(_,i)=>i)); }
  return _revealCache[pi];
}
</script>
<script>
/* =========================================================
   TEAM (iPad-Client)
   ========================================================= */
let T = null;         // {tid, name, emblem, code}
let lastState = null; // letzter Host-State
let myAnswers = {};   // "pi:qi" -> choice (lokal)
let sortLocal = null; // lokale Sortierreihenfolge
let helloTimer = null;

function renderJoin(){
  role = null;
  hostbar.classList.add("hidden");
  const saved = JSON.parse(localStorage.getItem("lumen-team")||"null");
  app.innerHTML = `
    <div style="flex:1; display:flex; flex-direction:column; justify-content:center; gap:18px; max-width:460px; margin:0 auto; width:100%;">
      <h2 style="color:var(--gold); letter-spacing:.2em;">MITSPIELEN</h2>
      <input class="text code" id="jCode" maxlength="4" placeholder="CODE" autocomplete="off" value="${saved?esc(saved.code||""):""}">
      <input class="text" id="jName" maxlength="18" placeholder="Teamname" autocomplete="off" value="${saved?esc(saved.name||""):""}">
      <div class="avatar-pick" id="jAvatar">${AVATARS.map(a=>`<button class="avatar-option" data-a="${a.id}"><img src="img/avatar-${a.id}.png" alt="${esc(a.name)}"><span>${esc(a.name)}</span><small class="avatar-ability">${esc(a.ability)}</small></button>`).join("")}</div>
      <button class="btn big" id="jGo">Beitreten ➜</button>
      <button class="btn small secondary" onclick="renderStart()">← zurück</button>
    </div>`;
  let avatarId = saved ? saved.avatarId : null;
  document.querySelectorAll("#jAvatar button").forEach(b=>{
    if(b.dataset.a===avatarId) b.classList.add("sel");
    b.onclick = ()=>{ document.querySelectorAll("#jAvatar button").forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); avatarId=b.dataset.a; };
  });
  $("#jGo").onclick = ()=>{
    const code = $("#jCode").value.trim().toUpperCase();
    const name = $("#jName").value.trim();
    if(code.length!==4){ alert("Bitte den 4-stelligen Raumcode von der Tafel eingeben."); return; }
    if(!name){ alert("Bitte einen Teamnamen eingeben."); return; }
    if(!avatarId){ alert("Bitte wählt eine biblische Figur oder einen Philosophen aus."); return; }
    startTeam(code, name, avatarId);
  };
}

function startTeam(code, name, avatarId){
  role = "team";
  document.body.classList.add("is-team");
  const saved = JSON.parse(localStorage.getItem("lumen-team")||"null");
  const tid = (saved && saved.code===code) ? saved.tid : ("t"+Math.random().toString(36).slice(2,9));
  T = {tid, name, avatarId, emblem:EMBLEMS[0], code};
  localStorage.setItem("lumen-team", JSON.stringify(T));
  teamFlash("wait", "⏳", "Verbinde mit Raum " + code + " …");
  connect(code, onTeamMsg, ()=>{
    sayHello();
    helloTimer = setInterval(()=>{ if(!lastState) sayHello(); else { clearInterval(helloTimer); helloTimer=null; } }, 1500);
  });
}
function sayHello(){ send({t:"hello", tid:T.tid, name:T.name, avatarId:T.avatarId, emblem:T.emblem}); }

let _lastSig = null;
function onTeamMsg(m){
  if(!m) return;
  if(m.t==="assign" && m.tid===T?.tid){
    T.avatarId=m.avatarId; T.emblem=m.emblem; localStorage.setItem("lumen-team", JSON.stringify(T));
    if(lastState) teamRender();
    return;
  }
  if(m.t!=="state") return;
  const isNewPhase = !lastState || lastState.pi !== m.pi;
  const sig = JSON.stringify([m.pi, m.sub, m.teams]);
  lastState = m;
  if(isNewPhase){ sortLocal = null; }
  if(!isNewPhase && sig === _lastSig) return;   // Heartbeat ohne Änderung: nicht neu zeichnen
  _lastSig = sig;
  teamRender();
}
/* Sound/Konfetti nur einmal pro Ereignis abspielen */
const _onceKeys = new Set();
function once(key, fn){ if(_onceKeys.has(key)) return; _onceKeys.add(key); fn(); }

function teamFlash(kind, ico, text){
  app.innerHTML = `<div class="flash ${kind}"><div class="big-ico">${ico}</div><div>${esc(text)}</div></div>`;
}
function myTeamState(){ return lastState.teams.find(t=>t.tid===T.tid); }

function teamHeader(){
  const me = myTeamState();
  const P = lastState && PHASES[lastState.pi];
  const canHelp = P && ["quiz","reveal","tribunal","finale"].includes(P.type) && (lastState.sub.stage==="ask" || (P.type==="finale" && ["play","retry"].includes(lastState.sub.stage)));
  const helpUsed = lastState?.sub?.helpUsed?.[T.tid];
  const figur=avatarMeta(T.avatarId), helpCost=figur.id==="freud"?50:HELP_COST;
  const delta=me?.lastDelta||0;
  const deltaHtml=delta ? `<span class="points-change ${delta>0?"plus":"minus"}">${delta>0?"+":""}${delta} Punkte</span>` : "";
  return `${phaseImg(P)}<div class="row" style="justify-content:space-between; margin-bottom:14px;">
    <span class="team-guide"><img src="img/avatar-${figur.id}.png" alt="${esc(figur.name)}"><span class="team-guide-copy"><span class="guide-label">Eure Figur</span><span class="team-chip">${esc(figur.name)} · ${esc(T.name)}</span><span class="avatar-ability">${esc(figur.ability)}</span></span></span>
    <span class="row" style="gap:8px; align-items:flex-end;"><span class="team-chip">⭐ ${me?me.pts:0}</span>${deltaHtml}${canHelp?`<button class="btn small secondary" onclick="buyHelp()" ${helpUsed||!me||me.pts<helpCost?"disabled":""}>💡 Hilfe −${helpCost}</button>`:""}</span></div>`;
}
function buyHelp(){ if(T && lastState) send({t:"help", tid:T.tid, pi:lastState.pi}); }
function answerButtons(q, keyPrefix, disabled, eliminated=[]){
  const chosen = myAnswers[keyPrefix];
  return `<div class="answers ${q.a.length<=2?"one-col":""}">` + q.a.map((a,i)=>`
    <button class="ans-btn a${answerColorIndex(i,lastState?.sub)} ${chosen===i?"chosen":""} ${eliminated.includes(i)?"dim eliminated":""} ${disabled&&chosen!==i?"dim":""}" style="background:${ANSWER_COLORS[answerColorIndex(i,lastState?.sub)]}" data-i="${i}" ${disabled||eliminated.includes(i)?"disabled":""}>${esc(a)}${eliminated.includes(i)?"<br><small>ausgeschlossen</small>":""}</button>`).join("") + `</div>`;
}
function bindAnswers(handler){
  document.querySelectorAll(".ans-btn").forEach(b=> b.onclick = ()=>handler(parseInt(b.dataset.i,10)) );
}

function teamRender(){
  if(!lastState){ return; }
  const pi = lastState.pi, sub = lastState.sub || {};
  const P = PHASES[pi];
  const me = myTeamState();
  if(!me){ sayHello(); teamFlash("wait","👋","Anmeldung läuft …"); return; }

  /* Timer für Team-Ansichten */
  const withTimer = lastState.deadline && lastState.deadline > Date.now();

  if(P.type==="lobby"){
    app.innerHTML = `${teamHeader()}
      <div class="panel center" style="margin-top:30px;">
        <h2 style="color:var(--gold);">Ihr seid dabei! 🎉</h2>
        <p style="margin-top:10px; color:var(--muted);">Schaut zur Tafel – gleich geht es los.</p>
        <div class="row" style="margin-top:16px;">${lastState.teams.map(t=>`<span class="team-chip"><span class="emblem">${t.emblem}</span>${esc(t.name)}</span>`).join("")}</div>
      </div>`;
    return;
  }

  if(P.type==="world-intro"){
    app.innerHTML = `${teamHeader()}${worldBanner(P.world)}<div class="panel center"><p style="font-size:1.2rem;">Blick zur Tafel! ${WORLDS.find(w=>w.id===P.world).icon}</p></div>`;
    return;
  }

  if(P.type==="quiz"){
    const q = P.questions[sub.qi];
    const key = pi+":"+sub.qi;
    if(sub.stage==="ask"){
      const answered = myAnswers[key]!==undefined;
      app.innerHTML = `${teamHeader()}
        ${withTimer?timerHtml():""}
        <div class="panel"><p style="font-size:1.15rem; ${P.emoji&&q.q.length<40?"font-size:2.2rem; text-align:center;":""}">${esc(q.q)}</p></div>
        ${answerButtons(q, key, answered, sub.eliminated?.[T.tid]||[])}
        ${answered?`<p class="center" style="margin-top:14px; color:var(--muted);">Antwort gesendet – warten auf die anderen …</p>`:""}`;
      if(withTimer) runTimerUI(lastState.deadline, lastState.total, null);
      if(!answered) bindAnswers(i=>{
        myAnswers[key]=i; send({t:"ans", tid:T.tid, pi, qi:sub.qi, choice:i}); sfx.whoosh(); teamRender();
      });
    } else {
      const mine = myAnswers[key];
      const ok = mine===q.correct;
      app.innerHTML = `${teamHeader()}
        <div class="flash ${mine===undefined?"wait":(ok?"ok":"bad")}" style="position:static; border-radius:18px; min-height:50vh;">
          <div class="big-ico">${mine===undefined?"⏳":(ok?"✅":"❌")}</div>
          <div>${mine===undefined?"Keine Antwort abgegeben":(ok?"Richtig!":"Leider falsch")}</div>
          <div style="font-size:1.05rem; color:rgba(255,255,255,.85);">Richtig war: „${esc(q.a[q.correct])}“</div>
        </div>`;
      if(mine!==undefined){ once("qres:"+key, ()=>{ ok?sfx.correct():sfx.wrong(); }); }
    }
    return;
  }

  if(P.type==="reveal" || P.type==="tribunal"){
    const key = pi+":clue";
    if(sub.stage==="ask"){
      const locked = (sub.locked||[]).includes(T.tid);
      const answered = sub.answered && sub.answered[T.tid]!==undefined;
      const q = {a:P.options};
      const clues = P.clues ? `<div class="clue-list"><div class="world-tag">Indizien für euer Team</div>${P.clues.slice(0,sub.step+1).map((clue,i)=>`<div class="clue-item ${i===sub.step?"current":""}">🔎 ${esc(clue)}</div>`).join("")}</div>` : "";
      app.innerHTML = `${teamHeader()}
        ${withTimer?timerHtml():""}
        ${clues}
        <div class="panel center"><p style="font-size:1.1rem;">${P.type==="reveal"?"Was zeigt das Bild an der Tafel?":"Wer ist die gesuchte Person?"}</p>
        <p style="color:var(--gold); margin-top:6px;">Stufe ${sub.step+1}: ${CLUE_PTS[Math.min(sub.step,2)]} Punkte · Falsch = −50 & gesperrt</p></div>
        ${locked?`<div class="flash bad" style="position:static; border-radius:18px; margin-top:14px;"><div class="big-ico">🔒</div><div>Gesperrt für diese Runde</div></div>`
          : answerButtons(q, key, answered, sub.eliminated?.[T.tid]||[]) }
        ${answered&&!locked?`<p class="center" style="margin-top:14px; color:var(--muted);">Gesendet …</p>`:""}`;
      if(withTimer) runTimerUI(lastState.deadline, lastState.total, null);
      if(!locked && !answered) bindAnswers(i=>{
        myAnswers[key]=i; send({t:"ans", tid:T.tid, pi, choice:i}); sfx.whoosh(); teamRender();
      });
    } else if(sub.stage==="res"){
      const win = sub.winner===T.tid;
      app.innerHTML = `${teamHeader()}
        <div class="flash ${win?"ok":"wait"}" style="position:static; border-radius:18px; min-height:50vh;">
          <div class="big-ico">${win?"🏆":"👀"}</div>
          <div>${win?"Ihr wart es!":"Auflösung an der Tafel"}</div>
          <div style="font-size:1.05rem;">${esc(P.type==="reveal"?P.solution:P.options[P.correct])}</div>
        </div>`;
    } else if(sub.stage==="follow"){
      const fkey = pi+":follow";
      const answered = myAnswers[fkey]!==undefined;
      app.innerHTML = `${teamHeader()}
        ${withTimer?timerHtml():""}
        <div class="panel"><p style="font-size:1.15rem;">${esc(P.follow.q)}</p></div>
        ${answerButtons(P.follow, fkey, answered, sub.eliminated?.[T.tid]||[])}
        ${answered?`<p class="center" style="margin-top:14px; color:var(--muted);">Gesendet …</p>`:""}`;
      if(withTimer) runTimerUI(lastState.deadline, lastState.total, null);
      if(!answered) bindAnswers(i=>{
        myAnswers[fkey]=i; send({t:"ans", tid:T.tid, pi, choice:i}); sfx.whoosh(); teamRender();
      });
    } else {
      const mine = myAnswers[pi+":follow"];
      const ok = mine===P.follow.correct;
      app.innerHTML = `${teamHeader()}
        <div class="flash ${mine===undefined?"wait":(ok?"ok":"bad")}" style="position:static; border-radius:18px; min-height:50vh;">
          <div class="big-ico">${mine===undefined?"⏳":(ok?"✅":"❌")}</div>
          <div>Richtig war: „${esc(P.follow.a[P.follow.correct])}“</div></div>`;
    }
    return;
  }

  if(P.type==="sort"){
    if(sub.stage==="work"){
      if(!sortLocal){ sortLocal = shuffle(P.items.map((_,i)=>i)); sendSortProgress(P, pi, false); }
      const done = (sub.prog && sub.prog[T.tid] && sub.prog[T.tid].done) || false;
      app.innerHTML = `${teamHeader()}
        ${withTimer?timerHtml():""}
        <div class="panel center"><p>${esc(P.title)}: Bringt alles in die richtige Reihenfolge (oben = zuerst)!</p></div>
        <div class="sort-list">${sortLocal.map((itemIdx,pos)=>`
          <div class="sort-item ${done?"locked":""}"><span class="num">${pos+1}</span> ${esc(P.items[itemIdx])}
            <span class="updown">
              <button ${done||pos===0?"disabled":""} data-up="${pos}">▲</button>
              <button ${done||pos===sortLocal.length-1?"disabled":""} data-down="${pos}">▼</button>
            </span></div>`).join("")}
        </div>
        <div class="center" style="margin-top:16px;">
          ${done?`<h2 style="color:var(--gold);">Eingeloggt! ✅</h2>`:`<button class="btn" id="sortDone">Reihenfolge einloggen ✓</button>`}
        </div>`;
      if(withTimer) runTimerUI(lastState.deadline, lastState.total, null);
      document.querySelectorAll("[data-up]").forEach(b=>b.onclick=()=>{
        const p=parseInt(b.dataset.up,10); [sortLocal[p-1],sortLocal[p]]=[sortLocal[p],sortLocal[p-1]]; sfx.tick(); sendSortProgress(P,pi,false); teamRender();
      });
      document.querySelectorAll("[data-down]").forEach(b=>b.onclick=()=>{
        const p=parseInt(b.dataset.down,10); [sortLocal[p+1],sortLocal[p]]=[sortLocal[p],sortLocal[p+1]]; sfx.tick(); sendSortProgress(P,pi,false); teamRender();
      });
      const sd = $("#sortDone");
      if(sd) sd.onclick = ()=>{
        const correct = countCorrect(P);
        if(correct === P.items.length){ sendSortProgress(P, pi, true); sfx.correct(); }
        else { sendSortProgress(P, pi, false); sfx.wrong();
          const el = document.createElement("div");
          el.className="flash bad"; el.innerHTML=`<div class="big-ico">🤔</div><div>${correct} von ${P.items.length} sitzen schon richtig – weiter tüfteln!</div>`;
          document.body.appendChild(el); setTimeout(()=>el.remove(), 1600);
        }
      };
    } else {
      app.innerHTML = `${teamHeader()}
        <div class="panel"><b>Die richtige Reihenfolge:</b>
        <ol style="margin:10px 0 0 22px; line-height:1.9;">${P.items.map(i=>`<li>${esc(i)}</li>`).join("")}</ol></div>`;
    }
    return;
  }

  if(P.type==="creative"){
    const myPrompt = P.prompts[(sub.assigned||{})[T.tid] ?? 0];
    const sent = sub.texts && sub.texts[T.tid]!==undefined;
    if(sub.stage==="write" && !sent){
      const keep = $("#creTxt") ? $("#creTxt").value : "";
      app.innerHTML = `${teamHeader()}
        ${withTimer?timerHtml():""}
        <div class="panel"><p style="color:var(--muted); margin-bottom:8px;">Euer Satzanfang:</p>
          <p style="font-size:1.25rem; font-style:italic;">„${esc(myPrompt)}“</p></div>
        <textarea class="free-input" id="creTxt" maxlength="220" placeholder="Eure Vervollständigung …" style="margin-top:14px;"></textarea>
        <div class="center" style="margin-top:14px;"><button class="btn" id="creSend">Absenden ✍️</button></div>`;
      $("#creTxt").value = keep;
      if(withTimer) runTimerUI(lastState.deadline, lastState.total, null);
      $("#creSend").onclick = ()=>{
        const txt = $("#creTxt").value.trim();
        if(txt.length<5){ alert("Schreibt noch einen ganzen Gedanken dazu!"); return; }
        send({t:"txt", tid:T.tid, pi, text:txt}); sfx.correct(); teamRender();
      };
    } else {
      app.innerHTML = `${teamHeader()}<div class="flash wait" style="position:static; border-radius:18px; min-height:50vh;">
        <div class="big-ico">${sent?"✅":"✍️"}</div><div>${sent?"Abgeschickt! Warten auf die anderen …":"Gleich seid ihr dran …"}</div></div>`;
    }
    return;
  }

  if(P.type==="vote"){
    if(sub.stage==="vote"){
      const voted = sub.votes && sub.votes[T.tid]!==undefined;
      app.innerHTML = `${teamHeader()}
        ${withTimer?timerHtml():""}
        <div class="panel center"><p>Stimmt für die beste Antwort – <b>nicht die eigene!</b></p></div>
        <div style="display:flex; flex-direction:column; gap:12px; margin-top:14px;">
          ${(sub.entries||[]).map((e,i)=>{
            const own = e.key===T.tid;
            return `<button class="vote-card ${own?"mine":""}" data-k="${e.key}" ${own||voted?"disabled":""} style="text-align:left; cursor:pointer; ${voted&&sub.votes[T.tid]===e.key?"outline:3px solid var(--gold);":""}">
              <span style="color:var(--gold)">${i+1}.</span> „${esc(e.text)}“ ${own?"<br><i style='font-size:.85rem;'>(eure eigene)</i>":""}</button>`;}).join("")}
        </div>
        ${voted?`<p class="center" style="margin-top:14px; color:var(--muted);">Stimme abgegeben ✓</p>`:""}`;
      if(withTimer) runTimerUI(lastState.deadline, lastState.total, null);
      if(!voted) document.querySelectorAll(".vote-card[data-k]").forEach(b=>{
        if(!b.disabled) b.onclick = ()=>{ send({t:"vote", tid:T.tid, pi, key:b.dataset.k}); sfx.join(); teamRender(); };
      });
    } else {
      app.innerHTML = `${teamHeader()}<div class="flash wait" style="position:static; border-radius:18px; min-height:40vh;">
        <div class="big-ico">🏆</div><div>Ergebnisse an der Tafel!</div></div>`;
    }
    return;
  }

  if(P.type==="world-done"){
    const meIdx = [...lastState.teams].sort((a,b)=>b.pts-a.pts).findIndex(t=>t.tid===T.tid);
    const b=sub.bonus;
    if(b?.stage==="ask"){
      const key="bonus:"+pi, answered=b.answers[T.tid]!==undefined;
      app.innerHTML = `${teamHeader()}${worldBanner(P.world)}
        <div class="panel center"><h2 style="color:var(--gold);">🎁 Bonusfrage · +150 Punkte</h2>
        <p style="margin-top:12px; font-size:1.15rem;">${esc(b.q.q)}</p></div>
        ${answerButtons(b.q,key,answered,[])}`;
      if(!answered) bindAnswers(i=>{ myAnswers[key]=i; send({t:"bonus",tid:T.tid,pi,choice:i}); sfx.whoosh(); teamRender(); });
    } else {
      app.innerHTML = `${teamHeader()}${worldBanner(P.world)}
        <div class="panel center"><h2 style="color:var(--gold);">✨ Fenster ${P.world} leuchtet! ✨</h2>
        <p style="margin-top:10px;">Ihr seid gerade auf <b>Platz ${meIdx+1}</b>.</p>
        ${b?`<p style="margin-top:14px; color:var(--gold);">${b.winner===T.tid?"🏆 Ihr habt den Bonus gewonnen!":b.winner?"Der Bonus ging an ein anderes Team.":"Niemand hat die Bonusfrage richtig beantwortet."}</p>`:""}</div>
        ${scoreboardHtml(lastState.teams, true)}`;
    }
    return;
  }

  if(P.type==="finale-intro"){
    app.innerHTML = `${teamHeader()}<div class="panel center" style="margin-top:20px;">
      <h2 style="color:var(--gold); letter-spacing:.15em;">DAS FINALE</h2>
      <p style="margin-top:12px; font-size:1.1rem; line-height:1.7;">Gleich bekommt ihr <b>eine</b> Frage.<br>Nur wenn <b>alle Teams</b> richtig liegen, leuchtet das Fenster.<br>Jetzt zählt der ganze Kurs. 🕯️</p></div>`;
    return;
  }

  if(P.type==="finale"){
    const myQi = (sub.assigned||{})[T.tid] ?? 0;
    const q = P.questions[myQi];
    const myRes = (sub.results||{})[T.tid];
    if(sub.stage==="won"){
      once("finale-won", ()=>{ confettiBurst(160); sfx.fanfare(); });
      app.innerHTML = `${teamHeader()}<div class="center finale-image" style="margin-top:14px;">${aiImg("finale-fenster","3/4","380px")}</div>
        <div class="flash ok" style="position:static; border-radius:18px; min-height:34vh; margin-top:14px;">
        <div class="big-ico">🕯️</div><div style="font-size:2rem; letter-spacing:.15em;">ES WERDE LICHT!</div><div>Ihr habt es gemeinsam geschafft!</div></div>`;
      return;
    }
    if(myRes===true){
      app.innerHTML = `${teamHeader()}<div class="flash ok" style="position:static; border-radius:18px; min-height:50vh;">
        <div class="big-ico">✅</div><div>Eure Antwort sitzt!</div><div style="font-size:1rem;">Helft jetzt den anderen Teams – laut und deutlich! 📣</div></div>`;
      return;
    }
    if(myRes===false && sub.stage==="play"){
      app.innerHTML = `${teamHeader()}<div class="flash bad" style="position:static; border-radius:18px; min-height:50vh;">
        <div class="big-ico">❌</div><div>Noch nicht … gleich kommt eine zweite Chance!</div></div>`;
      return;
    }
    const key = pi+":f:"+sub.round;
    const answered = myAnswers[key]!==undefined && myRes!==undefined && myRes!==null;
    app.innerHTML = `${teamHeader()}
      ${withTimer?timerHtml():""}
      <div class="panel center" style="border-color:var(--gold);"><p style="color:var(--gold); letter-spacing:.15em;">EURE FINALFRAGE</p>
        <p style="font-size:1.2rem; margin-top:10px;">${esc(q.q)}</p></div>
      ${answerButtons(q, key, false, sub.eliminated?.[T.tid]||[])}`;
    if(withTimer) runTimerUI(lastState.deadline, lastState.total, null);
    bindAnswers(i=>{
      myAnswers[key]=i; send({t:"ans", tid:T.tid, pi, qi:myQi, choice:i}); sfx.whoosh();
    });
    return;
  }

  if(P.type==="ceremony"){
    const sorted = [...lastState.teams].sort((a,b)=>b.pts-a.pts);
    const meIdx = sorted.findIndex(t=>t.tid===T.tid);
    if(meIdx===0){ once("ceremony-conf", ()=>confettiBurst(160)); }
    app.innerHTML = `${teamHeader()}
      <div class="panel center" style="margin-top:20px;">
        <div style="font-size:3.5rem;">${["🥇","🥈","🥉"][meIdx]||"🏅"}</div>
        <h2 style="margin-top:8px;">Platz ${meIdx+1}</h2>
        <p style="color:var(--muted); margin-top:8px;">Danke für dieses Jahr – schöne Ferien! ☀️</p>
      </div>${scoreboardHtml(lastState.teams)}`;
    return;
  }
}

function countCorrect(P){
  let c=0; sortLocal.forEach((itemIdx,pos)=>{ if(itemIdx===pos) c++; });
  return c;
}
function sendSortProgress(P, pi, done){
  send({t:"prog", tid:T.tid, pi, correct:countCorrect(P), done});
}

/* ================= Start ================= */
renderStart();
</script>
