<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SozioModelle - Interaktives Lernspiel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <!-- Navigation -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i data-lucide="layers" class="text-indigo-600 w-6 h-6"></i>
                <span class="font-black text-xl tracking-tight uppercase">SozioModelle</span>
            </div>
            <div class="flex gap-2">
                <button id="nav-game" onclick="setView('game')" class="px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition-colors bg-indigo-600 text-white">
                    <i data-lucide="play-circle" class="w-[18px] h-[18px]"></i> Spiel
                </button>
                <button id="nav-library" onclick="setView('library')" class="px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition-colors text-slate-600 hover:bg-slate-100">
                    <i data-lucide="book-open" class="w-[18px] h-[18px]"></i> Modelle
                </button>
            </div>
        </div>
    </nav>

    <main id="main-content" class="max-w-5xl mx-auto p-4 md:p-8">
        <!-- Content gets injected here -->
    </main>

    <footer class="max-w-5xl mx-auto px-4 py-12 text-center text-slate-400 text-xs font-medium border-t border-slate-200 mt-12">
        Basierend auf: Schelsky (Mat 2), Bolte (Mat 3), Dahrendorf (Mat 4), Geißler (Mat 5) & SINUS (Mat 12/13)
    </footer>

    <script>
        // --- DATA ---
        const biographies = [
            {
                id: 1,
                name: "Hans-Dieter (62)",
                text: "Arbeitet seit 40 Jahren als Facharbeiter. Er besitzt ein kleines Eigenheim, liebt seinen Kleingarten und legt großen Wert auf Sicherheit, Ordnung und Tradition. Er ist stolz auf das Erreichte und blickt skeptisch auf moderne Technik-Trends.",
                correctCategory: "Traditionelles Milieu",
                model: "SINUS-Milieus",
                explanation: "Sein Fokus auf Sicherheit, Ordnung und die Verankerung in der traditionellen Arbeiterkultur passt zum Traditionellen Milieu (Material 12)."
            },
            {
                id: 2,
                name: "Der 'Durchschnitts-Bürger' (1955)",
                text: "Ein Industriearbeiter stellt fest, dass sein Lebensstil, sein Konsum (Kühlschrank, Auto) und seine politischen Rechte fast identisch mit denen der Angestellten und des Mittelstands geworden sind.",
                correctCategory: "Nivellierte Mittelstandsgesellschaft",
                model: "Schelsky-Modell",
                explanation: "Helmut Schelsky (Material 2) sah eine Angleichung der Lebensbedingungen zu einer breiten, einheitlichen Schicht voraus."
            },
            {
                id: 3,
                name: "Sabine (40)",
                text: "Sabine arbeitet als Kellnerin in einem Café. Sie ist angestellt, gehört aber weder zum klassischen Mittelstand der Selbstständigen noch zur hochqualifizierten Arbeiterelite.",
                correctCategory: "Falscher Mittelstand",
                model: "Bolte-Zwiebel",
                explanation: "Im Zwiebel-Modell (Material 3) werden Dienstleistungsberufe wie Kellner oft dem 'falschen Mittelstand' zugeordnet."
            },
            {
                id: 4,
                name: "Dr. Müller (55)",
                text: "Er ist Ministerialrat in einem Bundesministerium. Er hat eine akademische Ausbildung, trägt hohe Verantwortung und ist ein abhängiger Beschäftigter in einer Spitzenposition.",
                correctCategory: "Obere Dienstklasse",
                model: "Dahrendorf-Haus",
                explanation: "Dahrendorf (Material 4) ordnet hochrangige Beamte und leitende Angestellte der oberen Dienstklasse zu."
            },
            {
                id: 5,
                name: "Aleksej (35)",
                text: "Ist vor zwei Jahren nach Deutschland gekommen. Er arbeitet als ungelernte Hilfskraft. Trotz Vollzeitjob ist er sozial isoliert und hat kaum Teilhabe am gesellschaftlichen Leben.",
                correctCategory: "Ausländer (Randbereich)",
                model: "Geißler-Haus",
                explanation: "Rainer Geißler (Material 5) ergänzte das Modell um einen separaten Block für Ausländer, um deren besondere rechtliche und soziale Lage darzustellen."
            },
            {
                id: 6,
                name: "Lena (22)",
                text: "Design-Studentin, ständig online, sucht nach neuen Grenzen und unkonventionellen Lebenswegen. Karriere ist ihr weniger wichtig als Selbstverwirklichung und Vernetzung.",
                correctCategory: "Expeditives Milieu",
                model: "SINUS-Milieus",
                explanation: "Die ehrgeizige, kreative Avantgarde, die mobil und digital vernetzt ist (Material 12)."
            },
            {
                id: 7,
                name: "Max (17)",
                text: "Gymnasiast, engagiert sich bei Umweltprojekten, kritisiert den Massenkonsum und legt Wert auf Nachhaltigkeit und soziale Gerechtigkeit.",
                correctCategory: "Sozialökologisches Milieu",
                model: "SINUS-Jugendmilieus",
                explanation: "Jugendliche mit ausgeprägtem ökologischem und sozialem Gewissen (Material 13)."
            }
        ];

        const modelsData = {
            "Schelsky-Modell": {
                title: "Die nivellierte Mittelstandsgesellschaft",
                description: "Theorie der sozialen Angleichung nach dem 2. Weltkrieg. Abbau der Klassengegensätze hin zu einer breiten Mitte.",
                svg: `<svg viewBox="0 0 200 200" class="w-full h-40"><path d="M100 20 L130 80 L160 140 L150 160 L50 160 L40 140 L70 80 Z" fill="#6366f1" fill-opacity="0.2" stroke="#4f46e5" stroke-width="2" /><text x="100" y="110" text-anchor="middle" font-size="12" fill="#4338ca" font-weight="bold">Breite Mitte</text><text x="100" y="55" text-anchor="middle" font-size="8" fill="#4338ca">Spitze</text><text x="100" y="175" text-anchor="middle" font-size="8" fill="#4338ca">Basis</text></svg>`
            },
            "Bolte-Zwiebel": {
                title: "Das Zwiebel-Modell",
                description: "Visualisiert die Schichtung der deutschen Bevölkerung in den 1960ern. Die Form ähnelt einer Zwiebel, da die Mitte am größten ist.",
                svg: `<svg viewBox="0 0 200 200" class="w-full h-40"><ellipse cx="100" cy="100" rx="60" ry="80" fill="#f59e0b" fill-opacity="0.2" stroke="#d97706" stroke-width="2" /><line x1="40" y1="100" x2="160" y2="100" stroke="#d97706" stroke-dasharray="4" /><text x="100" y="90" text-anchor="middle" font-size="10" fill="#92400e" font-weight="bold">Mittelstand</text><text x="100" y="130" text-anchor="middle" font-size="8" fill="#92400e">Arbeiterschicht</text></svg>`
            },
            "Dahrendorf-Haus": {
                title: "Das Dahrendorf-Haus",
                description: "Gesellschaft als Haus mit verschiedenen 'Zimmern' (Schichten). Trennung nach Berufsgruppen und Machtpositionen.",
                svg: `<svg viewBox="0 0 200 200" class="w-full h-40"><rect x="50" y="40" width="100" height="120" fill="#10b981" fill-opacity="0.1" stroke="#059669" stroke-width="2" /><path d="M50 40 L100 10 L150 40" fill="none" stroke="#059669" stroke-width="2" /><line x1="50" y1="80" x2="150" y2="80" stroke="#059669" /><line x1="50" y1="120" x2="150" y2="120" stroke="#059669" /><text x="100" y="70" text-anchor="middle" font-size="10" fill="#065f46">Elite</text><text x="100" y="105" text-anchor="middle" font-size="10" fill="#065f46">Mittelstand</text><text x="100" y="145" text-anchor="middle" font-size="10" fill="#065f46">Arbeiter</text></svg>`
            },
            "Geißler-Haus": {
                title: "Das Geißler-Haus",
                description: "Erweiterung von Dahrendorf. Berücksichtigt moderne Dienstleistungsberufe und die soziale Randlage von Ausländern.",
                svg: `<svg viewBox="0 0 200 200" class="w-full h-40"><rect x="40" y="40" width="100" height="120" fill="#ef4444" fill-opacity="0.1" stroke="#dc2626" stroke-width="2" /><rect x="145" y="80" width="20" height="80" fill="#dc2626" fill-opacity="0.3" stroke="#dc2626" stroke-width="1" /><text x="155" y="125" text-anchor="middle" font-size="7" fill="#991b1b" transform="rotate(90 155 125)">Ausländer</text><text x="90" y="100" text-anchor="middle" font-size="10" fill="#991b1b">Schichten</text></svg>`
            },
            "SINUS-Milieus": {
                title: "Die Sinus-Milieus",
                description: "Zweidimensionales Modell: Soziale Lage (Y-Achse) und Grundorientierung (X-Achse). 'Kartoffel-Grafik'.",
                svg: `<svg viewBox="0 0 200 200" class="w-full h-40"><line x1="20" y1="180" x2="20" y2="20" stroke="#ccc" stroke-width="1" /><line x1="20" y1="180" x2="180" y2="180" stroke="#ccc" stroke-width="1" /><ellipse cx="60" cy="140" rx="25" ry="15" fill="#ec4899" fill-opacity="0.3" stroke="#db2777" /><ellipse cx="140" cy="60" rx="30" ry="20" fill="#ec4899" fill-opacity="0.3" stroke="#db2777" /><ellipse cx="100" cy="100" rx="40" ry="25" fill="#ec4899" fill-opacity="0.3" stroke="#db2777" /><text x="10" y="50" font-size="8" transform="rotate(-90 10 50)" fill="#666">Soziale Lage</text><text x="100" y="195" text-anchor="middle" font-size="8" fill="#666">Grundorientierung</text></svg>`
            }
        };

        // --- STATE ---
        let state = {
            view: 'game',
            currentIndex: 0,
            score: 0,
            selectedAnswer: null,
            showResult: false,
            gameFinished: false
        };

        // --- RENDER FUNCTIONS ---
        function setView(viewName) {
            state.view = viewName;
            render();
        }

        function restart() {
            state = {
                view: 'game',
                currentIndex: 0,
                score: 0,
                selectedAnswer: null,
                showResult: false,
                gameFinished: false
            };
            render();
        }

        function handleAnswer(option) {
            if (state.showResult) return;
            state.selectedAnswer = option;
            state.showResult = true;
            if (option === biographies[state.currentIndex].correctCategory) {
                state.score++;
            }
            render();
        }

        function nextQuestion() {
            if (state.currentIndex < biographies.length - 1) {
                state.currentIndex++;
                state.showResult = false;
                state.selectedAnswer = null;
                render();
            } else {
                state.gameFinished = true;
                render();
            }
        }

        function render() {
            const container = document.getElementById('main-content');
            
            // Update Navigation Buttons
            document.getElementById('nav-game').className = `px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition-colors ${state.view === 'game' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-600 hover:bg-slate-100'}`;
            document.getElementById('nav-library').className = `px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition-colors ${state.view === 'library' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-600 hover:bg-slate-100'}`;

            if (state.view === 'library') {
                container.innerHTML = `
                    <div class="space-y-8 fade-in">
                        <header class="text-center max-w-2xl mx-auto mb-12">
                            <h2 class="text-3xl font-black text-slate-900 mb-4">Theoretische Modelle im Überblick</h2>
                            <p class="text-slate-500">Diese Modelle visualisieren die Entwicklung der sozialen Ungleichheit in Deutschland von der Nachkriegszeit bis heute.</p>
                        </header>
                        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${Object.entries(modelsData).map(([key, data]) => `
                                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden flex flex-col hover:shadow-md transition-shadow">
                                    <div class="p-4 bg-slate-50 border-b border-slate-100 flex justify-center">
                                        ${data.svg}
                                    </div>
                                    <div class="p-6 flex-1 flex flex-col">
                                        <h3 class="font-black text-indigo-900 text-lg mb-2">${data.title}</h3>
                                        <p class="text-slate-600 text-sm leading-relaxed mb-4">${data.description}</p>
                                        <div class="mt-auto pt-4 border-t border-slate-100">
                                            <span class="text-xs font-bold text-slate-400 uppercase tracking-tighter">Schlüsselkonzept:</span>
                                            <div class="text-indigo-600 text-xs font-bold mt-1">${key === 'SINUS-Milieus' ? 'Werte & Lebensstile' : 'Vertikale Schichtung'}</div>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else {
                if (state.gameFinished) {
                    container.innerHTML = `
                        <div class="max-w-md mx-auto bg-white rounded-3xl shadow-2xl p-10 text-center border border-slate-100 fade-in">
                            <div class="mb-6 inline-flex p-5 bg-green-100 text-green-600 rounded-full">
                                <i data-lucide="check-circle-2" class="w-16 h-16"></i>
                            </div>
                            <h2 class="text-4xl font-black text-slate-900 mb-2">Bravo!</h2>
                            <p class="text-slate-600 mb-8 text-lg font-medium">Du hast <span class="text-indigo-600 font-bold">${state.score} von ${biographies.length}</span> Modellen korrekt erkannt.</p>
                            <button onclick="restart()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 transition-all shadow-lg hover:shadow-indigo-200">
                                <i data-lucide="refresh-ccw" class="w-5 h-5"></i> Spiel Neustarten
                            </button>
                        </div>
                    `;
                } else {
                    const currentBio = biographies[state.currentIndex];
                    const correct = currentBio.correctCategory;
                    const allCategories = biographies.map(b => b.correctCategory);
                    const others = allCategories.filter(c => c !== correct);
                    const options = [...new Set([correct, ...others.sort(() => 0.5 - Math.random()).slice(0, 3)])].sort();

                    container.innerHTML = `
                        <div class="grid md:grid-cols-2 gap-8 items-start fade-in">
                            <!-- Biographie -->
                            <div class="space-y-4">
                                <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
                                    <div class="bg-indigo-600 p-6 text-white">
                                        <div class="flex justify-between items-center mb-4">
                                            <span class="bg-indigo-400/30 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">Fallbeispiel ${state.currentIndex + 1}</span>
                                            <span class="text-sm font-mono opacity-80">Score: ${state.score}</span>
                                        </div>
                                        <h2 class="text-2xl font-bold">${currentBio.name}</h2>
                                        <p class="text-indigo-100 text-sm mt-1 flex items-center gap-1">
                                            Basis: <span class="font-bold underline">${currentBio.model}</span>
                                        </p>
                                    </div>
                                    <div class="p-8">
                                        <p class="text-slate-700 text-lg leading-relaxed font-medium">"${currentBio.text}"</p>
                                    </div>
                                </div>
                                <div class="bg-white p-4 rounded-2xl border border-slate-200 flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-400">
                                        <i data-lucide="info" class="w-5 h-5"></i>
                                    </div>
                                    <p class="text-xs text-slate-500 italic">Hinweis: Suche die Kategorie, die im ${currentBio.model} für diese Lebenssituation definiert wurde.</p>
                                </div>
                            </div>

                            <!-- Quiz-Antworten -->
                            <div class="space-y-3">
                                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest px-2 mb-4">Passende Kategorie:</h3>
                                ${options.map(option => {
                                    const isCorrect = option === correct;
                                    const isSelected = state.selectedAnswer === option;
                                    let btnClass = "bg-white hover:border-indigo-300 border-slate-200 hover:shadow-md";
                                    let icon = "";
                                    
                                    if (state.showResult) {
                                        if (isCorrect) {
                                            btnClass = "bg-green-50 border-green-500 text-green-700 shadow-sm";
                                            icon = '<i data-lucide="check-circle-2" class="text-green-500 w-6 h-6"></i>';
                                        } else if (isSelected) {
                                            btnClass = "bg-red-50 border-red-500 text-red-700";
                                            icon = '<i data-lucide="x-circle" class="text-red-500 w-6 h-6"></i>';
                                        } else {
                                            btnClass = "opacity-40 border-slate-100";
                                        }
                                    }

                                    return `
                                        <button 
                                            onclick="handleAnswer('${option}')"
                                            ${state.showResult ? 'disabled' : ''}
                                            class="w-full p-5 rounded-2xl border-2 text-left font-bold transition-all flex items-center justify-between group ${btnClass}"
                                        >
                                            <span>${option}</span>
                                            ${icon}
                                        </button>
                                    `;
                                }).join('')}

                                ${state.showResult ? `
                                    <div class="mt-8 fade-in">
                                        <div class="bg-indigo-50 border-l-4 border-indigo-500 p-6 rounded-r-2xl mb-4">
                                            <h4 class="text-indigo-900 font-black text-sm uppercase mb-2">Soziologische Analyse</h4>
                                            <p class="text-indigo-800 text-sm leading-relaxed">${currentBio.explanation}</p>
                                        </div>
                                        <button onclick="nextQuestion()" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-5 rounded-2xl flex items-center justify-center gap-2 transition-all shadow-xl">
                                            Nächste Biographie <i data-lucide="chevron-right" class="w-5 h-5"></i>
                                        </button>
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    `;
                }
            }
            lucide.createIcons();
        }

        // Initial Start
        window.onload = render;
    </script>
</body>
</html>
