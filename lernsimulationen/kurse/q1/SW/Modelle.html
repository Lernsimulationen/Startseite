<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">

    <title>AEQUITAS // NEURO-MASTER 12.0</title>
    <style>
        /* DESIGN SYSTEM */
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-pink: #ff0055;
            --success: #00ff88;
            --bg-deep: #010108;
            --panel-bg: rgba(10, 15, 35, 0.95);
            --border-glow: rgba(0, 242, 255, 0.25);
            --font-main: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-tech: 'Consolas', 'Monaco', 'Courier New', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-deep);
            color: #d1d5db;
            font-family: var(--font-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        /* ATMOSPHERE */
        .ambient-fx {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: 
                radial-gradient(circle at 10% 15%, rgba(188, 19, 254, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 85%, rgba(0, 242, 255, 0.08) 0%, transparent 40%);
            pointer-events: none;
        }

        .grid-mask {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(var(--border-glow) 1px, transparent 1px), linear-gradient(90deg, var(--border-glow) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.15;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
        }

        /* LAYOUT CORE */
        #neuro-app {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .hud-header {
            height: clamp(80px, 12vh, 110px);
            margin: 1rem 1rem 0.5rem 1rem;
            padding: 0 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-glow);
            border-radius: 1.25rem;
            background: var(--panel-bg);
            backdrop-filter: blur(25px);
        }

        .stat-group { display: flex; align-items: center; gap: 2.5rem; }
        .label { font-family: var(--font-tech); font-size: 0.6rem; letter-spacing: 0.25rem; text-transform: uppercase; color: var(--neon-purple); margin-bottom: 0.2rem; }
        .value { font-family: var(--font-tech); font-size: clamp(1.2rem, 2.2vw, 1.8rem); font-weight: 800; color: #fff; }

        .viewport {
            flex: 1;
            margin: 0.5rem 1rem 1rem 1rem;
            border-radius: 1.25rem;
            border: 1px solid var(--border-glow);
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        .screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: clamp(1.5rem, 5vw, 4rem);
            animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* BUTTONS */
        .btn-neuro {
            padding: 1rem 2.5rem;
            background: rgba(0, 242, 255, 0.05);
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            font-family: var(--font-tech);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-neuro:hover:not(:disabled) { background: var(--neon-blue); color: #000; box-shadow: 0 0 40px var(--neon-blue); transform: translateY(-3px); }
        .btn-neuro:disabled { opacity: 0.2; border-color: #444; color: #444; cursor: not-allowed; }

        /* INTERACTIVE MAP */
        .map-surface { width: 100%; height: 100%; position: relative; }
        .node-anchor {
            position: absolute;
            width: 100px; height: 100px;
            transform: translate(-50%, -50%);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            z-index: 50;
        }
        .node-visual {
            width: 75px; height: 75px;
            border: 2px solid var(--neon-blue);
            border-radius: 1.5rem;
            background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .node-anchor:hover .node-visual { transform: scale(1.2) rotate(4deg); border-color: #fff; box-shadow: 0 0 30px var(--neon-blue); }
        .node-anchor.done .node-visual { background: var(--success); color: #000; border-color: #fff; box-shadow: 0 0 20px var(--success); }

        .node-val { font-family: var(--font-tech); font-size: 1.6rem; font-weight: 900; }
        .node-tag { font-size: 0.5rem; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }

        /* TASK INTERFACE */
        .task-box { width: 100%; max-width: 900px; text-align: left; }
        .question { font-size: clamp(1.4rem, 3.5vw, 2.4rem); font-weight: 800; color: #fff; line-height: 1.1; margin-bottom: 3rem; border-left: 8px solid var(--neon-purple); padding-left: 2rem; }
        .option-card { width: 100%; padding: 1.5rem 2rem; margin-bottom: 1rem; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 1rem; color: #cbd5e1; text-align: left; cursor: pointer; transition: 0.3s; font-size: 1.25rem; }
        .option-card:hover { background: rgba(0, 242, 255, 0.1); border-color: var(--neon-blue); color: #fff; transform: translateX(15px); }

        /* WORD SEARCH */
        .vocab-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 6px; max-width: 550px; margin: 2rem auto; }
        .v-cell { aspect-ratio: 1; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; border-radius: 6px; font-family: var(--font-tech); font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: 0.1s; }
        .v-cell.sel { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px var(--neon-blue); }
        .v-cell.found { background: var(--success); color: #000; }

        /* MODAL */
        .modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.96); backdrop-filter: blur(12px); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .modal-box { background: #050512; border: 1px solid var(--neon-blue); padding: 4rem; border-radius: 2.5rem; max-width: 750px; width: 100%; text-align: center; }
        .code-strip { font-family: var(--font-tech); font-size: clamp(2.5rem, 8vw, 4.5rem); color: var(--success); margin: 2.5rem 0; padding: 1.5rem; border: 2px dashed rgba(0, 255, 136, 0.4); background: rgba(0,0,0,0.6); border-radius: 1.5rem; text-shadow: 0 0 25px var(--success); letter-spacing: 0.8rem; }

        .cloze-field { border: none; border-bottom: 4px solid var(--neon-blue); background: transparent; color: #fff; width: 180px; text-align: center; font-size: 2.2rem; margin: 0 10px; outline: none; font-weight: 800; transition: 0.3s; }
        .cloze-field:focus { width: 220px; border-color: white; }

        .hidden { display: none !important; }
    </style>
</head>

                    if(isDone) node.classList.add('done');
                    node.style.left = coords[i][0] + "%"; node.style.top = coords[i][1] + "%";
                    
                    const inner = document.createElement('div'); inner.className = 'node-visual';
                    const spanId = document.createElement('span'); spanId.className = 'node-val'; spanId.textContent = isDone ? "✓" : m.id;
                    const spanNm = document.createElement('span'); spanNm.className = 'node-tag'; spanNm.textContent = m.name;
                    inner.appendChild(spanId); inner.appendChild(spanNm); node.appendChild(inner);
                    
                    if(!isDone) {
                        node.addEventListener('click', () => { state.curS = i; state.curT = 0; state.attempts = 0; renderTask(); });
                    }
                    surface.appendChild(node);
                });
                
                const term = document.createElement('button'); term.className = 'btn-neuro'; term.textContent = "Final Decryption";
                term.style.position = "absolute"; term.style.bottom = "4rem"; term.style.left = "50%"; term.style.transform = "translateX(-50%)";
                term.disabled = state.done.length < 8;
                term.addEventListener('click', openTerminal);
                surface.appendChild(term); v.appendChild(surface);
            }

            function renderTask() {
                const sector = MISSIONS[state.curS];
                const task = sector.tasks[state.curT];
                if(!task) { finishSector(sector); return; }
                
                const v = $('neuro-viewport'); v.innerHTML = '';
                const screen = document.createElement('div'); screen.className = 'screen';
                const box = document.createElement('div'); box.className = 'task-box';
                
                const label = document.createElement('div'); label.className = 'label'; label.textContent = `Sector ${sector.name} // Task 0${state.curT + 1}`;
                box.appendChild(label);

                if(task.t === "choice") {
                    const q = document.createElement('div'); q.className = 'question'; q.textContent = task.q;
                    box.appendChild(q);
                    task.o.forEach((o, i) => {
                        const btn = document.createElement('button'); btn.className = 'option-card'; btn.textContent = o;
                        btn.addEventListener('click', () => { 
                            if(i === task.cor) { state.score += 50; state.time += 30; state.attempts = 0; state.curT++; renderTask(); updateHUD(); } 
                            else { state.time -= 60; state.attempts++; updateHUD(); showModal("SYNC FEHLER", "Tip: " + task.h, state.attempts >= 2); } 
                        });
                        box.appendChild(btn);
                    });
                } else {
                    const q = document.createElement('div'); q.className = 'question';
                    const parts = task.q.split('______');
                    q.appendChild(document.createTextNode(parts[0]));
                    const inp = document.createElement('input'); inp.className = 'cloze-field'; inp.id = 'gap-in'; inp.maxLength = 20;
                    q.appendChild(inp); 
                    if(parts[1]) q.appendChild(document.createTextNode(parts[1]));
                    box.appendChild(q);
                    
                    const go = document.createElement('button'); go.className = 'btn-neuro'; go.style.marginTop = "4rem"; go.textContent = "Algorithmus prüfen";
                    go.addEventListener('click', () => { 
                        if($('gap-in').value.toLowerCase().trim() === task.a) { state.score += 50; state.curT++; renderTask(); } 
                        else { state.time -= 60; state.attempts++; showModal("SYNC FEHLER", "Tip: " + task.h, state.attempts >= 2); } 
                    });
                    box.appendChild(go);
                }
                screen.appendChild(box); v.appendChild(screen);
            }

            function finishSector(s) {
                if(!state.done.includes(s.id)) state.done.push(s.id);
                const frag = document.createDocumentFragment();
                const code = document.createElement('div'); code.className = 'code-strip'; code.textContent = atob(s.c);
                frag.appendChild(code);
                const p = document.createElement('p'); p.style.fontSize = '1.4rem'; p.textContent = "Sektor-Frequenz gesichert. Fragment für Terminal registriert.";
                frag.appendChild(p);
                showModal("STABILISIERUNG ABGESCHLOSSEN", frag, false, renderMap);
            }

            function openTerminal() {
                const v = $('neuro-viewport'); v.innerHTML = '';
                const sc = document.createElement('div'); sc.className = 'screen';
                const h2 = document.createElement('h2'); h2.className = 'label'; h2.style.fontSize = '3rem'; h2.style.marginBottom = '4rem'; h2.textContent = 'Master Key Decryption';
                sc.appendChild(h2);
                
                const grid = document.createElement('div'); grid.style.display = 'grid'; grid.style.gridTemplateColumns = '1fr 1fr'; grid.style.gap = '2rem'; grid.style.marginBottom = '4rem'; grid.style.width = "100%"; grid.style.maxWidth = "750px";
                MISSIONS.forEach(m => {
                    const i = document.createElement('input'); i.className = 'cloze-field'; i.style.width = "100%"; i.placeholder = m.name + " Key"; i.id = 'key-' + m.id;
                    grid.appendChild(i);
                });
                sc.appendChild(grid);
                
                const b = document.createElement('button'); b.className = 'btn-neuro'; b.textContent = "Reboot Singularity";
                b.addEventListener('click', () => {
                    let valid = true;
                    MISSIONS.forEach(m => { if($('key-'+m.id).value.toUpperCase().trim() !== atob(m.c)) valid = false; });
                    if(valid) startWordSearch(); else showModal("ZUGRIFF VERWEIGERT", "Matrix-Schlüssel nicht kompatibel.");
                });
                sc.appendChild(b); v.appendChild(sc);
            }

            function startWordSearch() {
                const v = $('neuro-viewport'); v.innerHTML = '';
                const sc = document.createElement('div'); sc.className = 'screen';
                const h2 = document.createElement('h2'); h2.className = 'label'; h2.textContent = 'Vokabel-Stabilitäts-Check';
                sc.appendChild(h2);

                const board = document.createElement('div'); board.className = 'vocab-grid';
                const size = 12; let matrix = Array(size).fill().map(() => Array(size).fill(''));
                
                VOCAB.forEach(w => {
                    let done = false; let tries = 0;
                    while(!done && tries < 100) {
                        let r = Math.floor(Math.random()*size), c = Math.floor(Math.random()*size), dr = Math.random()>0.5?1:0, dc = dr===0?1:0;
                        if(r+dr*w.length <= size && c+dc*w.length <= size) {
                            let fit = true; for(let i=0; i<w.length; i++) if(matrix[r+i*dr][c+i*dc] !== '') fit = false;
                            if(fit) { for(let i=0; i<w.length; i++) matrix[r+i*dr][c+i*dc] = w[i]; done = true; }
                        }
                        tries++;
                    }
                });

                for(let r=0; r<size; r++) {
                    for(let c=0; c<size; c++) {
                        if(matrix[r][c]==='') matrix[r][c] = "ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.floor(Math.random()*26)];
                        const cell = document.createElement('div'); cell.className = 'v-cell'; cell.textContent = matrix[r][c];
                        cell.addEventListener('click', () => { 
                            cell.classList.toggle('sel'); 
                            const current = Array.from(document.querySelectorAll('.v-cell.sel')).map(el => el.textContent).join('');
                            VOCAB.forEach(word => {
                                if(current === word && !state.foundWords.includes(word)) {
                                    state.foundWords.push(word);
                                    document.querySelectorAll('.v-cell.sel').forEach(el => { el.classList.remove('sel'); el.classList.add('found'); });
                                    if(state.foundWords.length === VOCAB.length) showVictory();
                                }
                            });
                        });
                        board.appendChild(cell);
                    }
                }
                sc.appendChild(board); v.appendChild(sc);
            }

            function startClock() {
                if(clockId) clearInterval(clockId);
                clockId = setInterval(() => {
                    if(!state.paused) {
                        state.time--; updateHUD();
                        if(state.time <= 0) { clearInterval(clockId); location.reload(); }
                    }
                }, 1000);
            }

            function showVictory() {
                state.paused = true; clearInterval(clockId);
                const v = $('neuro-viewport'); v.innerHTML = '';
                const sc = document.createElement('div'); sc.className = 'screen';
                const h1 = document.createElement('h1'); h1.className = 'label'; h1.style.color = "var(--success)"; h1.style.fontSize = "10rem"; h1.textContent = "STABLE";
                const p = document.createElement('p'); p.style.fontSize = "2.5rem"; p.textContent = "Matrix gesichert. Integrität: " + state.score;
                sc.appendChild(h1); sc.appendChild(p); v.appendChild(sc);
            }

            $('ctrl-log').addEventListener('click', () => {
                const b = new Blob([`LOG ID: ${state.id}\nSCORE: ${state.score}\nSYNC: ${state.done.length}/8`], {type:'text/plain'});
                const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `Report_${state.id}.txt`; a.click();
            });

            window.onload = renderIntro;
        })();
    </script>
</body>
</html>
