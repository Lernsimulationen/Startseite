<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    style-src 'self' 'unsafe-inline';
    script-src 'self' 'unsafe-inline';
    img-src 'self' data:;
    connect-src 'none';
    frame-src 'none';
    object-src 'none';
    base-uri 'self';
    form-action 'self';
  ">
  <title>Projektkurswahl - Lernstudio</title>
  <style>
    :root{
      --bg: #eef7f6;
      --bg-accent: #d9eeeb;
      --surface: rgba(255,255,255,0.92);
      --surface-strong: #ffffff;
      --text: #16363b;
      --muted: #59757a;
      --border: rgba(22, 54, 59, 0.14);
      --accent: #0f766e;
      --accent-soft: rgba(15, 118, 110, 0.12);
      --shadow: 0 20px 45px rgba(14, 66, 72, 0.1);
      --radius: 22px;
      --max: 1120px;
    }

    * { box-sizing: border-box; }

    body{
      margin: 0;
      font-family: "Segoe UI", "Trebuchet MS", Arial, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(circle at top right, rgba(15, 118, 110, 0.15), transparent 32%),
        linear-gradient(180deg, var(--bg), var(--bg-accent));
    }

    .shell{
      max-width: var(--max);
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .hero{
      padding: 26px;
      border-radius: 30px;
      border: 1px solid var(--border);
      background: linear-gradient(135deg, rgba(255,255,255,0.98), rgba(231, 247, 244, 0.92));
      box-shadow: var(--shadow);
    }

    .eyebrow{
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.78);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    h1{
      margin: 16px 0 10px;
      font-size: clamp(2.1rem, 4vw, 3.4rem);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .lead{
      margin: 0;
      max-width: 68ch;
      color: var(--muted);
      line-height: 1.7;
    }

    .hero-actions{
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    .actions{
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }

    .btn{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 11px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      font-weight: 700;
      transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
    }

    .btn:hover{
      transform: translateY(-1px);
      border-color: rgba(15, 118, 110, 0.26);
      background: rgba(15, 118, 110, 0.08);
    }

    .btn.primary{
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn.primary:hover{
      background: #0b625c;
      border-color: #0b625c;
    }

    footer{
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }

    .back-link{
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    .back-link:hover{ text-decoration: underline; }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div>
        <div class="eyebrow">Beratungslehrer</div>
        <h1>Projektkurswahl</h1>
        <p class="lead">
          Übersicht und Auswahl der angebotenen Projektkurse.
        </p>
        <div class="hero-actions">
          <a class="btn primary" href="./projektkurse-q1.html">Projektkurswahl öffnen</a>
        </div>
      </div>
    </section>

    <footer>
      <a class="back-link" href="../index.html">&larr; Zurück zur Kursübersicht</a>
    </footer>
  </div>
</body>
</html>
